<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS - Pro Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Segoe UI", Tahoma, sans-serif; background: #000; }

        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: calc(100vh - 35px);
            width: 100vw;
            position: relative;
        }

        /* ICONS */
        .icon-container { display: flex; flex-direction: column; gap: 10px; padding: 20px; width: 110px; }
        .icon {
            width: 80px; height: 90px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            cursor: pointer; font-size: 12px; text-align: center;
            border: 1px solid transparent;
        }
        .icon:hover { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; }
        .icon img { width: 45px; height: 45px; margin-bottom: 5px; }

        /* WINDOWS */
        .window {
            position: absolute; width: 750px; height: 500px;
            background: #f0f0f0; border: 1px solid #0054e3;
            border-radius: 6px 6px 0 0; display: none;
            flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white; padding: 0 10px; display: flex;
            justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 13px; height: 32px; cursor: move;
        }

        .close-btn {
            background: #e81123; color: white; width: 35px; height: 32px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; margin-right: -10px; font-size: 16px;
        }

        /* BROWSER INTERNALS */
        .tab-bar {
            display: flex; background: #dfe1e5; padding: 8px 8px 0 8px;
            gap: 4px; border-bottom: 1px solid #ccc; align-items: flex-end;
        }
        .tab {
            background: #dee1e6; border: none; padding: 8px 15px;
            font-size: 11px; cursor: pointer; min-width: 100px; max-width: 150px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            border-radius: 8px 8px 0 0; position: relative; color: #444;
            display: flex; align-items: center; justify-content: space-between;
        }
        .tab.active { background: #fff; color: #000; font-weight: 500; }
        .close-tab { font-size: 14px; margin-left: 10px; opacity: 0.6; }
        .close-tab:hover { opacity: 1; color: red; }
        
        .new-tab-btn { background: none; border: none; font-size: 18px; color: #5f6368; cursor: pointer; padding-bottom: 2px; }

        .browser-nav { background: #fff; padding: 8px; display: flex; gap: 10px; border-bottom: 1px solid #ccc; align-items: center; }
        .url-bar {
            flex-grow: 1; background: #f1f3f4; border-radius: 20px;
            padding: 6px 15px; border: 1px solid transparent; outline: none; font-size: 13px;
        }
        .url-bar:focus { background: #fff; border: 1px solid #0054e3; }
        
        .window-body { flex-grow: 1; background: #fff; position: relative; overflow: hidden; }
        .browser-frame { width: 100%; height: 100%; border: none; display: none; }
        .browser-frame.active { display: block; }

        /* NOTEPAD */
        .notepad-area {
            width: 100%; height: 100%; border: none; padding: 10px;
            font-family: 'Consolas', 'Courier New', monospace; font-size: 14px;
            outline: none; resize: none;
        }

        /* TASKBAR */
        .taskbar {
            position: fixed; bottom: 0; width: 100%; height: 35px;
            background: #202124; display: flex; justify-content: space-between; 
            align-items: center; z-index: 9999; color: white;
        }
        .start-btn { height: 100%; padding: 0 15px; cursor: pointer; background: #3c4043; font-weight: bold; display: flex; align-items: center; }
        .system-tray { padding: 0 15px; font-size: 12px; }
    </style>
</head>
<body>

<div class="desktop">
    <div class="icon-container">
        <div class="icon" onclick="openWindow('netscape-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/world-0.png">
            <span>Browser</span>
        </div>
        <div class="icon" onclick="openWindow('notepad-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/notepad-0.png">
            <span>Notepad</span>
        </div>
        <div class="icon" onclick="openWindow('os-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/console_prompt-0.png">
            <span>Terminal</span>
        </div>
    </div>

    <div id="netscape-window" class="window" style="top:40px; left:80px;" onmousedown="focusWin(this)">
        <div class="window-header" id="netscape-window-header">
            <span>Yxon6 Browser</span>
            <div class="close-btn" onclick="closeWindow('netscape-window')">×</div>
        </div>
        <div class="tab-bar" id="tab-bar">
            <button class="new-tab-btn" onclick="createNewTab()">+</button>
        </div>
        <div class="browser-nav">
            <input type="text" class="url-bar" id="url-input" placeholder="Search Google or enter URL" onkeydown="if(event.key==='Enter') netGo(this.value)">
            <button onclick="netGo(document.getElementById('url-input').value)">Go</button>
        </div>
        <div class="window-body" id="browser-container"></div>
    </div>

    <div id="notepad-window" class="window" style="top:100px; left:150px; width:500px; height:400px;" onmousedown="focusWin(this)">
        <div class="window-header" id="notepad-window-header">
            <span>Notepad</span>
            <div class="close-btn" onclick="closeWindow('notepad-window')">×</div>
        </div>
        <div class="window-body">
            <textarea class="notepad-area" placeholder="Write something..."></textarea>
        </div>
    </div>

    <div id="os-window" class="window" style="top:150px; left:200px; width:600px; height:350px;" onmousedown="focusWin(this)">
        <div class="window-header" id="os-window-header"><span>Terminal</span><div class="close-btn" onclick="closeWindow('os-window')">×</div></div>
        <div class="window-body" style="background:black;"><iframe id="os-frame" style="width:100%; height:100%; border:none;"></iframe></div>
    </div>
</div>

<div class="taskbar">
    <div class="start-btn">YXON6</div>
    <div class="system-tray" id="clock">00:00</div>
</div>

<script>
    let tabIdCounter = 0;
    let activeTabId = null;
    const homePage = "https://www.google.com/webhp?igu=1";

    // --- BROWSER LOGIC ---
    function createNewTab(url = homePage) {
        tabIdCounter++;
        const id = `tab-${tabIdCounter}`;
        const tabBtn = document.createElement('div');
        tabBtn.className = 'tab';
        tabBtn.id = `btn-${id}`;
        tabBtn.innerHTML = `<span>New Tab</span> <span class="close-tab" onclick="closeTab(event, '${id}')">×</span>`;
        tabBtn.onclick = () => switchTab(id);
        const tabBar = document.getElementById('tab-bar');
        tabBar.insertBefore(tabBtn, tabBar.lastElementChild);

        const frame = document.createElement('iframe');
        frame.id = id;
        frame.className = 'browser-frame';
        frame.src = url;
        document.getElementById('browser-container').appendChild(frame);
        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.browser-frame').forEach(f => f.classList.remove('active'));
        document.getElementById(`btn-${id}`).classList.add('active');
        document.getElementById(id).classList.add('active');
        const frame = document.getElementById(id);
        document.getElementById('url-input').value = (frame.src.includes('google.com/webhp')) ? '' : frame.src;
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById(`btn-${id}`).remove();
        document.getElementById(id).remove();
        if (activeTabId === id) {
            const lastTab = document.querySelector('.tab');
            if (lastTab) switchTab(lastTab.id.replace('btn-', ''));
            else activeTabId = null;
        }
    }

    function netGo(val) {
        if (!activeTabId) createNewTab();
        let url = val.trim();
        if (!url) return;

        // If it's not a URL (no dot or has space), search Google
        if (!url.includes('.') || url.includes(' ')) {
            url = 'https://www.google.com/search?q=' + encodeURIComponent(url) + '&igu=1';
        } else {
            if (!url.startsWith('http')) url = 'https://' + url;
        }

        const frame = document.getElementById(activeTabId);
        frame.src = url;
        
        // Update Tab Label
        const label = url.replace('https://', '').replace('www.', '').split(/[/?#]/)[0];
        document.getElementById(`btn-${activeTabId}`).querySelector('span').textContent = label;
    }

    // --- WINDOW MGMT ---
    let zIndex = 100;
    function focusWin(win) { win.style.zIndex = ++zIndex; }
    
    function openWindow(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWin(win);
        if(id === 'netscape-window' && !activeTabId) createNewTab();
        if(id === 'os-window') {
            document.getElementById('os-frame').srcdoc = `<body style="background:black;color:lime;font-family:monospace;padding:10px;">C:\\> <input style="background:transparent;border:none;color:lime;outline:none;" autofocus></body>`;
        }
    }

    function closeWindow(id) { document.getElementById(id).style.display = 'none'; }

    // --- DRAG LOGIC ---
    function makeDraggable(elm) {
        let p1=0, p2=0, p3=0, p4=0;
        const header = document.getElementById(elm.id + "-header");
        header.onmousedown = (e) => {
            p3 = e.clientX; p4 = e.clientY;
            document.onmouseup = () => { document.onmousemove = null; };
            document.onmousemove = (e) => {
                p1 = p3 - e.clientX; p2 = p4 - e.clientY;
                p3 = e.clientX; p4 = e.clientY;
                elm.style.top = (elm.offsetTop - p2) + "px";
                elm.style.left = (elm.offsetLeft - p1) + "px";
            };
        };
    }
    makeDraggable(document.getElementById("netscape-window"));
    makeDraggable(document.getElementById("notepad-window"));
    makeDraggable(document.getElementById("os-window"));

    // --- CLOCK ---
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }, 1000);
</script>

</body>
</html>
