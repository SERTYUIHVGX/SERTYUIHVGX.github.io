<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern 222 - Blue Gem Directory</title>
    <style>
        :root {
            /* Case Hardened Palette */
            --gunmetal-gray: #0f1115;
            --steel-dark: #1a1d23;
            --blue-gem-light: #48c6ef; /* Bright azure highlight */
            --blue-gem-deep: #206abf;  /* Deep ocean blue */
            --gold-accent: #c5a059;    /* Tiny hints of "gold" from the case hardened mix */
            --text-color: #d1d5db;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--gunmetal-gray);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #0f1115 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--blue-gem-light) 0%, var(--blue-gem-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
            filter: drop-shadow(0 0 10px rgba(72, 198, 239, 0.3));
        }

        .category-section {
            margin-bottom: 60px;
        }

        .category-title {
            font-size: 1rem;
            color: var(--gold-accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .link-card {
            background: var(--steel-dark);
            border-radius: 4px; /* Sharper edges like a blade */
            padding: 2px; /* For the gradient border effect */
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            /* This creates the "Blue Gem" metallic finish */
            background: linear-gradient(145deg, 
                var(--blue-gem-deep) 0%, 
                #1e3a8a 30%, 
                var(--steel-dark) 70%
            );
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .link-card:hover {
            transform: scale(1.03);
            background: linear-gradient(145deg, 
                var(--blue-gem-light) 0%, 
                var(--blue-gem-deep) 40%, 
                var(--steel-dark) 100%
            );
        }

        .card-content {
            background: rgba(15, 17, 21, 0.85);
            padding: 20px;
            height: 100%;
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .link-url {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            word-break: break-all;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .link-card:hover .link-url {
            color: var(--blue-gem-light);
        }

        /* Subtle "Pattern" Overlay */
        .link-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            opacity: 0.1;
            pointer-events: none;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Blue Gem // Pattern 222</h1>

    <div class="category-section">
        <div class="category-title">AWP Network</div>
        <div class="grid">
            <div class="link-card">
                <div class="card-content">
                    <a href="https://lessons.axsetubal.pt/" class="link-url">lessons.axsetubal.pt</a>
                </div>
            </div>
            <div class="link-card">
                <div class="card-content">
                    <a href="https://useawp.developer.li//" class="link-url">useawp.developer.li</a>
                </div>
            </div>
            <div class="link-card">
                <div class="card-content">
                    <a href="https://api.incatel.cl/" class="link-url">api.incatel.cl</a>
                </div>
            </div>
        </div>
    </div>

    <div class="category-section">
        <div class="category-title">Truffled</div>
        <div class="grid">
            <div class="link-card">
                <div class="card-content">
                    <a href="https://edu.sciencecomputers.lat/" class="link-url">edu.sciencecomputers.lat</a>
                </div>
            </div>
            <div class="link-card">
                <div class="card-content">
                    <a href="https://truffled.lol/" class="link-url">truffled.lol</a>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
