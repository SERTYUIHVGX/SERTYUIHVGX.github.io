<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XP for iPad</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents iPad "bounce" scrolling */
            font-family: "Tahoma", sans-serif;
            touch-action: none; /* Disables default browser gestures */
        }

        .desktop {
            background: #3a6ea5 url('https://e0.pxfuel.com/wallpapers/315/518/desktop-wallpaper-windows-xp-bliss-windows-xp-original.jpg') no-repeat center center;
            background-size: cover;
            height: calc(100vh - 40px); /* Slightly taller taskbar for fingers */
            position: relative;
        }

        /* Window Styling */
        .window {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 320px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .title-bar {
            background: linear-gradient(to bottom, #0058e4 0%, #3d95ff 10%, #0058e4 100%);
            padding: 10px; /* Larger touch target */
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px #000;
        }

        .title-controls button {
            width: 25px;
            height: 25px;
            background: #ece9d8;
            border: 1px solid #fff;
            border-radius: 3px;
            font-weight: bold;
        }

        .close { background: linear-gradient(to bottom, #e76b39, #ad3100) !important; color: white; }

        .window-body {
            background: white;
            margin: 2px;
            border: 1px solid #7f9db9;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: none;
            padding: 10px;
            font-size: 16px; /* Prevents iOS from zooming in on focus */
            box-sizing: border-box;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex;
            align-items: center;
        }

        .start-button {
            height: 100%;
            padding: 0 25px;
            background: radial-gradient(circle at top left, #53a351, #388e3c);
            color: white;
            font-style: italic;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .system-tray {
            margin-left: auto;
            background: #0996f1;
            height: 100%;
            padding: 0 15px;
            color: white;
            display: flex;
            align-items: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="desktop">
    <div id="xpWindow" class="window">
        <div id="xpWindowHeader" class="title-bar">
            <span>Notepad</span>
            <div class="title-controls">
                <button class="close" onclick="document.getElementById('xpWindow').style.display='none'">X</button>
            </div>
        </div>
        <div class="window-body">
            <textarea>This works on iPad! 
Use your finger to drag the blue bar.</textarea>
        </div>
    </div>
</div>

<div class="taskbar">
    <div class="start-button">start</div>
    <div class="system-tray" id="clock">12:00 PM</div>
</div>

<script>
    // Drag Logic for Touch and Mouse
    const win = document.getElementById("xpWindow");
    const header = document.getElementById("xpWindowHeader");

    let active = false;
    let currentX;
    let currentY;
    let initialX;
    let initialY;
    let xOffset = 0;
    let yOffset = 0;

    // Listeners for both Mouse and Touch
    header.addEventListener("touchstart", dragStart, false);
    document.addEventListener("touchend", dragEnd, false);
    document.addEventListener("touchmove", drag, false);

    header.addEventListener("mousedown", dragStart, false);
    document.addEventListener("mouseup", dragEnd, false);
    document.addEventListener("mousemove", drag, false);

    function dragStart(e) {
        if (e.type === "touchstart") {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
        } else {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
        }
        active = true;
    }

    function dragEnd() {
        initialX = currentX;
        initialY = currentY;
        active = false;
    }

    function drag(e) {
        if (active) {
            e.preventDefault();
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }
            xOffset = currentX;
            yOffset = currentY;
            setTranslate(currentX, currentY, win);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
    }

    // Clock Logic
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>

</body>
</html>
