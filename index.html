<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yxonsProxyPanel | RED_EDITION</title>
    <style>
        :root {
            --bg-black: #050505;
            --panel-black: #0d0d0d;
            --accent-red: #ff0000;
            --dim-red: #800000;
            --text-gray: #cccccc;
            --border-style: 1px solid #1a1a1a;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-gray);
            font-family: 'Consolas', 'Monaco', monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 260px;
            background-color: var(--panel-black);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--accent-red);
            box-shadow: 2px 0 10px rgba(255, 0, 0, 0.1);
        }

        .header {
            padding: 20px;
            font-weight: bold;
            font-size: 16px;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: var(--border-style);
            text-shadow: 0 0 8px var(--accent-red);
        }

        #nav-list {
            padding: 15px;
            flex-grow: 1;
        }

        .nav-item {
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 2px;
            cursor: pointer;
            color: var(--dim-red);
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-size: 14px;
        }

        .nav-item:hover {
            background-color: rgba(255, 0, 0, 0.05);
            color: var(--accent-red);
            border-left: 3px solid var(--accent-red);
        }

        /* Main Console Styling */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-black);
        }

        #output {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
            background-image: radial-gradient(circle at center, #110000 0%, #050505 100%);
        }

        .system-msg { 
            color: var(--accent-red); 
            font-weight: bold; 
            margin-top: 15px; 
            text-transform: uppercase;
        }
        
        .log-entry { 
            color: #ffffff;
            margin-bottom: 5px; 
        }
        
        a {
            color: var(--accent-red);
            text-decoration: none;
            opacity: 0.8;
        }
        a:hover { 
            opacity: 1;
            text-decoration: underline;
            text-shadow: 0 0 5px var(--accent-red);
        }

        /* Bottom Input Bar */
        .input-container {
            padding: 20px;
            background-color: var(--panel-black);
            border-top: 1px solid var(--dim-red);
        }

        .input-wrapper {
            background-color: #000;
            border: 1px solid var(--dim-red);
            border-radius: 4px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-red);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        input::placeholder { color: #444; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--dim-red); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-red); }

    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">yxonsProxyPanel</div>
        <div id="nav-list">
            <div class="nav-item" onclick="handleCommand('proxylist')">[ VIEW DIRECTORY ]</div>
            <div class="nav-item" onclick="handleCommand('help')">[ SHOW COMMANDS ]</div>
            <div class="nav-item" onclick="handleCommand('clear')">[ PURGE LOGS ]</div>
        </div>
    </div>

    <div id="main-content">
        <div id="output">
            <div class="system-msg">// INITIALIZING RED_EDITION PROTOCOL...</div>
            <div class="log-entry">Waiting for user input. Select a module or type command.</div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="commandInput" placeholder="root@yxons:~#" autofocus autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');

        const database = {
            "awp": ["https://lessons.axsetubal.pt/", "https://useawp.developer.li//", "https://api.incatel.cl/", "https://useawp.7s.com.tr/"],
            "truffled": ["https://edu.sciencecomputers.lat/", "https://truffled.lol/", "https://ee.rxtech.cl/", "https://infoo.infotechnology.com/"],
            "void.network": ["https://awesome.martinwguy.net/?/", "https://strange.martinwguy.net/?/"],
            "quasar": ["https://epic.tomaszu.com/", "https://eglobaleducation.com/"],
            "vapour": ["https://watervapor.space/", "https://education-live.com/"],
            "boredom": ["https://pn.boredom.apertura.com/", "https://doxwind.xyz/", "https://wispserver.dev/"],
            "koopbin": ["https://koopbin.site/", "https://learnster.online/"],
            "nebula": ["https://math.school.dovereducation.org/", "http://clever.com.elmhoneyheath.recepist.com/"],
            "afilite": ["https://readinghelpforelementary.online/"],
            "splash": ["https://cullinary-schools.ks11.ru/", "https://darkn.ks11.ru/", "https://splashstudy.b-cdn.net/", "https://94a80745.splashcli.pages.dev/", "https://splsh.paladinmining.net/"]
        };

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleCommand(input.value);
                input.value = '';
            }
        });

        function handleCommand(rawVal) {
            const cmd = rawVal.trim().toLowerCase();
            if (!cmd) return;

            printLine(`> ${rawVal}`, "log-entry");

            if (cmd === 'proxylist') {
                printLine("NETWORK NODES DETECTED:", "system-msg");
                Object.keys(database).forEach(key => printLine(`:: ${key.toUpperCase()}`));
            } else if (database[cmd]) {
                printLine(`EXFILTRATING ENDPOINTS: [${cmd.toUpperCase()}]`, "system-msg");
                database[cmd].forEach(link => {
                    const div = document.createElement('div');
                    div.style.margin = "3px 0";
                    div.innerHTML = `<a href="${link}" target="_blank">[ACCESS_NODE] -> ${link}</a>`;
                    output.appendChild(div);
                });
            } else if (cmd === 'help') {
                printLine("ACCESS PRIVILEGES: proxylist, clear, help, [node_name]", "system-msg");
            } else if (cmd === 'clear') {
                output.innerHTML = '<div class="system-msg">// LOGS PURGED.</div>';
            } else {
                printLine(`FATAL ERR: '${rawVal}' NOT FOUND IN DATABASE.`, "system-msg");
            }

            output.scrollTop = output.scrollHeight;
        }

        function printLine(text, className = "") {
            const div = document.createElement('div');
            if (className) div.className = className;
            div.innerHTML = text;
            output.appendChild(div);
        }
    </script>
</body>
</html>
