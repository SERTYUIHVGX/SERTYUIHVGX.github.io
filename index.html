<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Interface</title>
    <style>
        /* Terminal Styling */
        body {
            background-color: #000;
            color: #ffb000; /* Classic Orange/Amber */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 0 0 5px #ffb000;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        .prompt {
            margin-right: 10px;
            user-select: none;
        }

        input {
            background: transparent;
            border: none;
            color: #ffb000;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
            text-shadow: 0 0 5px #ffb000;
        }

        /* Scanline effect for extra retro vibes */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="output">Welcome to the Terminal. Type 'help' for commands.</div>

    <div class="input-line">
        <span class="prompt">root@system:~$</span>
        <input type="text" id="commandInput" autofocus autocomplete="off" spellcheck="false">
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');

        const proxies = [
            "AWP", "Rosin", "Truffled", "Void.Network", 
            "Quasar", "Vapour", "Boredom", "Lucide", 
            "Koopbin", "Nebula", "Afilite", "Splash"
        ];

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = input.value.toLowerCase().trim();
                printLine(`root@system:~$ ${input.value}`);

                if (cmd === 'proxylist') {
                    printLine("\n--- ACTIVE PROXY LIST ---");
                    proxies.forEach(p => printLine(`> ${p}`));
                    printLine("-------------------------\n");
                } else if (cmd === 'help') {
                    printLine("Available commands: proxylist, clear, help");
                } else if (cmd === 'clear') {
                    output.innerHTML = '';
                } else {
                    printLine(`Command not found: ${cmd}`);
                }

                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        function printLine(text) {
            const div = document.createElement('div');
            div.textContent = text;
            output.appendChild(div);
        }
    </script>
</body>
</html>
