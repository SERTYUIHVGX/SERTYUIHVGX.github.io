<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS Web</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { 
            background-color: #008080; 
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: "MS Sans Serif", Arial, sans-serif;
            -webkit-font-smoothing: none;
        }
        .desktop {
            height: calc(100vh - 30px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .icon {
            width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: white;
            font-size: 11px;
            cursor: pointer;
            text-shadow: 1px 1px #000;
        }
        .icon img { width: 32px; height: 32px; margin-bottom: 4px; }
        .icon:active img { filter: brightness(0.5); }

        .taskbar {
            height: 30px;
            background: #c0c0c0;
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 2px;
            box-sizing: border-box;
            border-top: 2px solid #fff;
            z-index: 1000;
        }
        .start-button {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: bold;
            height: 22px;
            padding: 2px 6px;
        }
        .start-menu {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 200px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            z-index: 999;
        }
        .window {
            position: absolute;
            z-index: 10;
            user-select: none;
        }
        /* Make it clear the title bar is for dragging */
        .title-bar {
            cursor: move;
        }
    </style>
</head>
<body x-data="{ startMenu: false, yxon6Open: true, internetOpen: false }">

    <div class="desktop">
        <div class="icon" @click="yxon6Open = true">
            <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-4.png">
            <span>Yxon6 OS</span>
        </div>
        <div class="icon" @click="internetOpen = true">
            <img src="https://win98icons.alexmeub.com/icons/png/msie1-2.png">
            <span>Internet Explorer</span>
        </div>
    </div>

    <div class="window" 
         x-show="yxon6Open" 
         x-draggable 
         style="width: 320px; top: 50px; left: 50px;">
        <div class="title-bar">
            <div class="title-bar-text">Yxon6 OS</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close" @click="yxon6Open = false"></button>
            </div>
        </div>
        <div class="window-body">
            <p>Welcome to the Yxon6 operating system environment.</p>
            <ul class="tree-view">
              <li>(C:) System Files</li>
              <li>(D:) User Data</li>
              <li>Network Neighborhood</li>
              <li>Settings</li>
            </ul>
        </div>
    </div>

    <div class="window" 
         x-show="internetOpen" 
         x-draggable 
         style="width: 500px; height: 400px; top: 100px; left: 100px;">
        <div class="title-bar">
            <div class="title-bar-text">Internet Explorer - Google</div>
            <div class="title-bar-controls">
                <button aria-label="Close" @click="internetOpen = false"></button>
            </div>
        </div>
        <div class="window-body" style="margin: 0; height: calc(100% - 35px); background: white;">
            <iframe src="https://www.google.com/search?igu=1" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <div class="start-menu" x-show="startMenu" @click.outside="startMenu = false">
        <div style="background: linear-gradient(to top, #000080, #1084d0); width: 25px; height: 100%; position: absolute; left: 0; bottom: 0;">
            <span style="transform: rotate(-90deg); color: white; position: absolute; bottom: 40px; left: -15px; font-weight: bold; width: 100px;">Yxon6 OS</span>
        </div>
        <div style="margin-left: 30px;">
            <button class="icon" style="width: 100%; text-align: left; padding: 5px; color: black; text-shadow: none;" @click="internetOpen = true; startMenu = false">
                Programs
            </button>
            <button class="icon" style="width: 100%; text-align: left; padding: 5px; color: black; text-shadow: none;">
                Documents
            </button>
            <hr>
            <button class="icon" style="width: 100%; text-align: left; padding: 5px; color: black; text-shadow: none;">
                Shut Down...
            </button>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-button" @click="startMenu = !startMenu">
            <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16">
            Start
        </button>
        <div style="flex-grow: 1;"></div>
        <div class="status-bar" style="padding: 2px 10px; box-shadow: inset -1px -1px #fff, inset 1px 1px #808080;">
            <span id="time" style="font-size: 11px;">12:00 PM</span>
        </div>
    </div>

    <script>
        // Custom Alpine.js Logic for Draggable Windows
        document.addEventListener('alpine:init', () => {
            Alpine.directive('draggable', (el) => {
                let titleBar = el.querySelector('.title-bar');
                let offsetX = 0, offsetY = 0, mouseX = 0, mouseY = 0;

                titleBar.onmousedown = dragMouseDown;

                function dragMouseDown(e) {
                    e.preventDefault();
                    // Move this window to the top of the stack
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
                    el.style.zIndex = 100;

                    mouseX = e.clientX;
                    mouseY = e.clientY;
                    document.onmouseup = closeDragElement;
                    document.onmousemove = elementDrag;
                }

                function elementDrag(e) {
                    e.preventDefault();
                    offsetX = mouseX - e.clientX;
                    offsetY = mouseY - e.clientY;
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                    el.style.top = (el.offsetTop - offsetY) + "px";
                    el.style.left = (el.offsetLeft - offsetX) + "px";
                }

                function closeDragElement() {
                    document.onmouseup = null;
                    document.onmousemove = null;
                }
            });
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
