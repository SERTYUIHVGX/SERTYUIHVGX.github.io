<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS - Terminal Edition</title>
    <style>
        /* CORE DESKTOP STYLES */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Tahoma", sans-serif; }

        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Desktop Icon */
        .icon {
            width: 90px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            padding: 10px;
            margin: 10px;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
        }
        .icon img { width: 45px; height: 45px; margin-bottom: 4px; }
        .icon:active { background-color: rgba(255, 255, 255, 0.2); border-radius: 3px; }

        /* XP Window Styling */
        .window {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 70%;
            max-width: 800px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0;
            display: none; 
            box-shadow: 10px 10px 25px rgba(0,0,0,0.5);
            z-index: 10;
            flex-direction: column;
        }

        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            height: 32px;
        }

        .close-btn {
            background: linear-gradient(to bottom, #f2453e 0%, #c72c2c 100%);
            color: white;
            border: 1px solid white;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            cursor: pointer;
        }

        /* Container for your Terminal Code */
        .window-body {
            flex-grow: 1;
            margin: 2px;
            background: black;
            border: 1px solid #7f9db9;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .start-btn { height: 100%; cursor: pointer; }

        .system-tray {
            color: white;
            background: linear-gradient(to bottom, #0997ff 0%, #0053ee 100%);
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 12px;
            border-left: 1px solid #10b5fc;
        }
    </style>
</head>
<body>

    <div class="desktop" onclick="closeStart()">
        <!-- Icon to launch Terminal -->
        <div class="icon" onclick="event.stopPropagation(); toggleWindow('terminal-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/console_prompt-0.png" alt="Yxon6 OS">
            <span>Yxon6 OS</span>
        </div>

        <!-- The XP Window containing the Terminal -->
        <div id="terminal-window" class="window">
            <div class="window-header">
                <span>Terminal - Yxon6 OS</span>
                <div class="close-btn" onclick="toggleWindow('terminal-window')">X</div>
            </div>
            <div class="window-body">
                <!-- Embedding your Terminal Code here -->
                <iframe srcdoc="
                    <html>
                    <head>
                        <style>
                            body { background-color: #000; color: #ff0000; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-y: auto; text-shadow: 0 0 8px #800000; }
                            #clock { position: fixed; top: 10px; right: 10px; font-size: 14px; border: 1px solid #ff0000; padding: 2px 8px; background: black; }
                            #logo { white-space: pre; font-size: 8px; margin-bottom: 10px; }
                            .prompt { color: #ff0000; margin-right: 5px; }
                            input { background: transparent; border: none; color: #ff0000; font-family: inherit; outline: none; width: 70%; caret-color: white; }
                            .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 3px; pointer-events: none; }
                        </style>
                    </head>
                    <body onclick='document.getElementById(&quot;cmd&quot;).focus()'>
                        <div class='scanlines'></div>
                        <div id='clock'>00:00:00</div>
                        <div id='logo'>
      ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ       ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ      ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ  
    ‚ĖĄ‚Ėą‚Ėą‚ĖÄ‚ĖÄ‚ĖÄ‚Ėą    ‚ĖĄ‚Ėą‚ĖÄ‚ĖÄ‚Ėą‚Ėą‚Ėą‚Ėą‚ĖĄ  ‚Ėą‚Ėą‚ĖÄ‚ĖÄ‚ĖÄ‚ĖÄ‚Ėą‚ĖĄ
 ‚ĖĄ   ‚Ėą‚Ėą         ‚Ėą‚Ėą    ‚Ėą‚Ėą   ‚ĖÄ‚Ėą‚Ėą‚ĖĄ  ‚ĖĄ‚ĖÄ
‚Ėą‚Ėą ‚Ėą‚Ėą‚ĖÄ‚Ėą‚Ėą ‚Ėą‚Ėą‚ĖÄ ‚ĖĄ‚Ėą‚Ėą‚Ėą‚ĖĄ ‚Ėą‚Ėą‚Ėą‚Ėą‚ĖĄ‚Ėą‚Ėą‚ĖĄ‚Ėą‚Ėą‚Ėą‚ĖĄ    ‚Ėą‚Ėą    ‚Ėą‚Ėą     ‚ĖÄ‚Ėą‚Ėą‚ĖĄ‚ĖĄ 
‚Ėą‚Ėą‚ĖĄ‚Ėą‚Ėą  ‚Ėą‚Ėą‚Ėą   ‚Ėą‚Ėą ‚Ėą‚Ėą ‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą‚Ėą‚ĖÄ  ‚Ėą‚Ėą    ‚Ėą‚Ėą    ‚Ėą‚Ėą   ‚ĖĄ   ‚ĖÄ‚Ėą‚Ėą‚ĖĄ
‚ĖĄ‚ĖĄ‚ĖÄ‚Ėą‚Ėą‚ĖÄ‚ĖĄ‚Ėą‚Ėą ‚Ėą‚Ėą‚ĖĄ‚ĖĄ‚ĖÄ‚Ėą‚Ėą‚Ėą‚ĖÄ‚ĖĄ‚Ėą‚Ėą ‚ĖÄ‚Ėą‚ĖÄ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖÄ     ‚ĖÄ‚Ėą‚Ėą‚Ėą‚Ėą‚ĖÄ    ‚ĖÄ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖÄ
                        </div>
                        <div id='out'>SYSTEM ONLINE... TYPE 'proxylist' OR 'help'</div>
                        <div style='display:flex;'>
                            <span class='prompt'>guest@terminal:~$</span>
                            <input type='text' id='cmd' autofocus autocomplete='off'>
                        </div>
                        <script>
                            const database = { 
                                'awp': ['https://lessons.axsetubal.pt/'], 
                                'truffled': ['https://truffled.lol/'],
                                'nebula': ['https://math.school.dovereducation.org/']
                            };
                            const input = document.getElementById('cmd');
                            const out = document.getElementById('out');
                            
                            function updateClock() {
                                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
                            }
                            setInterval(updateClock, 1000);

                            input.addEventListener('keydown', (e) => {
                                if(e.key === 'Enter'){
                                    const val = input.value.toLowerCase().trim();
                                    const line = document.createElement('div');
                                    line.textContent = 'guest@terminal:~$ ' + input.value;
                                    out.appendChild(line);
                                    
                                    if(val === 'proxylist') {
                                        Object.keys(database).forEach(k => {
                                            const d = document.createElement('div');
                                            d.textContent = '- ' + k.toUpperCase();
                                            out.appendChild(d);
                                        });
                                    } else if(database[val]) {
                                        database[val].forEach(link => {
                                            const d = document.createElement('div');
                                            d.textContent = '> ' + link;
                                            out.appendChild(d);
                                        });
                                    } else if(val === 'clear') { out.innerHTML = ''; }
                                    
                                    input.value = '';
                                    window.scrollTo(0, document.body.scrollHeight);
                                }
                            });
                        </script>
                    </body>
                    </html>
                "></iframe>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <img class="start-btn" src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3e/Windows_XP_Start_button.png/150px-Windows_XP_Start_button.png" onclick="event.stopPropagation(); toggleStart()">
        <div class="system-tray">
            <span id="tray-clock">--:--</span>
        </div>
    </div>

    <script>
        function toggleWindow(id) {
            const win = document.getElementById(id);
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleStart() { /* Simple placeholder for Start menu */ }
        function closeStart() { /* Click desktop to close menus */ }

        function updateTrayClock() {
            const now = new Date();
            document.getElementById('tray-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateTrayClock, 1000);
        updateTrayClock();
    </script>
</body>
</html>
