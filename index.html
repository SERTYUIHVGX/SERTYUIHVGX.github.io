<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windows XP iPad Edition</title>
    <style>
        /* CSS STYLES */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: "Tahoma", "Segoe UI", sans-serif;
        }

        /* Desktop Area */
        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Icons */
        .icon {
            width: 80px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 1px 1px 2px black;
            padding: 10px;
            margin: 10px;
            text-align: center;
            font-size: 12px;
        }

        .icon img {
            width: 42px;
            margin-bottom: 5px;
        }

        /* The Window */
        .window {
            position: absolute;
            top: 15%;
            left: 10%;
            width: 80%;
            max-width: 500px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0;
            display: none; /* Hidden by default */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            height: 30px;
        }

        .close-btn {
            background: #e04343;
            color: white;
            border: 1px solid white;
            font-weight: bold;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
        }

        .window-body {
            padding: 20px;
            height: 200px;
            color: black;
            background: white;
            margin: 2px;
            border: 1px solid #7f9db9;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .start-btn {
            height: 100%;
            cursor: pointer;
        }

        .system-tray {
            color: white;
            background: linear-gradient(to bottom, #0997ff 0%, #0053ee 100%);
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            border-left: 1px solid #10b5fc;
        }

        /* Start Menu */
        .start-menu {
            position: fixed;
            bottom: 35px;
            left: 0;
            width: 280px;
            background: white;
            border: 2px solid #245edb;
            border-radius: 5px 5px 0 0;
            display: none;
            z-index: 99;
            box-shadow: 2px -2px 10px rgba(0,0,0,0.2);
        }

        .start-menu-header {
            background: linear-gradient(to bottom, #1d52d1 0%, #4689f2 100%);
            color: white;
            padding: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="desktop" onclick="closeStart()">
        <div class="icon" onclick="event.stopPropagation(); toggleWindow('pc-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/computer_explore_2k-4.png" alt="My Computer">
            <span>My Computer</span>
        </div>

        <div id="pc-window" class="window">
            <div class="window-header">
                <span>My Computer</span>
                <div class="close-btn" onclick="toggleWindow('pc-window')">X</div>
            </div>
            <div class="window-body">
                <b>Welcome to Windows XP</b>
                <p>This clone is running purely on HTML/CSS/JS.</p>
                <p>Touch works perfectly on iPad.</p>
            </div>
        </div>
    </div>

    <div id="start-menu" class="start-menu">
        <div class="start-menu-header">Administrator</div>
        <div style="padding: 10px; color: #333;">
            <p>📁 My Documents</p>
            <p>🌐 Internet Explorer</p>
            <hr>
            <p>Log Off | Shut Down</p>
        </div>
    </div>

    <div class="taskbar">
        <img class="start-btn" src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3e/Windows_XP_Start_button.png/150px-Windows_XP_Start_button.png" onclick="event.stopPropagation(); toggleStart()">
        
        <div class="system-tray">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        function toggleWindow(id) {
            const win = document.getElementById(id);
            win.style.display = (win.style.display === 'block') ? 'none' : 'block';
        }

        function toggleStart() {
            const menu = document.getElementById('start-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function closeStart() {
            document.getElementById('start-menu').style.display = 'none';
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('clock').innerText = hours + ":" + minutes + " " + ampm;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
