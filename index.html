<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XP for iPad</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: "Tahoma", "Segoe UI", sans-serif;
            touch-action: none;
            background-color: #000; /* Fallback */
        }

        .desktop {
            /* The iconic Bliss wallpaper */
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/en/2/27/Bliss_%28Windows_XP_wallpaper%29.png') no-repeat center center;
            background-size: cover;
            height: calc(100vh - 40px);
            position: relative;
            width: 100%;
        }

        /* Window Styling */
        .window {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 320px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .title-bar {
            background: linear-gradient(to bottom, #0058e4 0%, #3d95ff 10%, #0058e4 100%);
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px #002e86;
            cursor: grab;
        }

        .title-controls {
            display: flex;
            gap: 2px;
        }

        .title-controls button {
            width: 22px;
            height: 22px;
            border: 1px solid #fff;
            border-radius: 3px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .close { 
            background: linear-gradient(to bottom, #e76b39, #ad3100) !important; 
            color: white; 
        }

        .window-body {
            background: white;
            margin: 2px;
            border: 1px solid #7f9db9;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: none;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            resize: none;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex;
            align-items: center;
            z-index: 100;
        }

        .start-button {
            height: 100%;
            padding: 0 15px 0 10px;
            background: radial-gradient(circle at top left, #53a351, #388e3c);
            color: white;
            font-style: italic;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            box-shadow: 2px 0px 5px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .start-button img {
            width: 22px;
            margin-right: 5px;
        }

        .system-tray {
            margin-left: auto;
            background: linear-gradient(to bottom, #0996f1, #0076d1);
            height: 100%;
            padding: 0 15px;
            color: white;
            display: flex;
            align-items: center;
            font-size: 13px;
            border-left: 1px solid #084ea1;
        }
    </style>
</head>
<body>

<div class="desktop">
    <div id="xpWindow" class="window">
        <div id="xpWindowHeader" class="title-bar">
            <span>Notepad</span>
            <div class="title-controls">
                <button style="background: linear-gradient(to bottom, #3d95ff, #0058e4); color: white;">_</button>
                <button class="close" onclick="document.getElementById('xpWindow').style.display='none'">X</button>
            </div>
        </div>
        <div class="window-body">
            <textarea>This feels more like home! 
            
Drag the blue bar to move me.
The "Bliss" wallpaper is now locked in.</textarea>
        </div>
    </div>
</div>

<div class="taskbar">
    <div class="start-button">
        <!-- Adding the classic Windows logo placeholder -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/df/Microsoft_Windows_Home_Icon.svg" alt="win">
        start
    </div>
    <div class="system-tray" id="clock">12:00 PM</div>
</div>

<script>
    const win = document.getElementById("xpWindow");
    const header = document.getElementById("xpWindowHeader");

    let active = false;
    let currentX;
    let currentY;
    let initialX;
    let initialY;
    let xOffset = 0;
    let yOffset = 0;

    header.addEventListener("touchstart", dragStart, {passive: false});
    document.addEventListener("touchend", dragEnd, {passive: false});
    document.addEventListener("touchmove", drag, {passive: false});

    header.addEventListener("mousedown", dragStart, false);
    document.addEventListener("mouseup", dragEnd, false);
    document.addEventListener("mousemove", drag, false);

    function dragStart(e) {
        if (e.type === "touchstart") {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
        } else {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
        }
        active = true;
    }

    function dragEnd() {
        initialX = currentX;
        initialY = currentY;
        active = false;
    }

    function drag(e) {
        if (active) {
            e.preventDefault();
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }
            xOffset = currentX;
            yOffset = currentY;
            setTranslate(currentX, currentY, win);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
