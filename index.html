<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS - Live News Edition</title>
    <style>
        /* CORE SYSTEM STYLES */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Tahoma", "Segoe UI", sans-serif; background: #000; display: flex; }

        /* NEWS SIDEBAR */
        #news-sidebar {
            width: 0;
            height: 100%;
            background: #ece9d8;
            border-right: 2px solid #0054e3;
            transition: width 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            z-index: 10000;
        }
        #news-sidebar.open { width: 280px; }
        .news-header { 
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%); 
            color: white; padding: 10px; font-weight: bold; font-size: 13px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .news-content { padding: 10px; font-size: 12px; color: #333; overflow-y: auto; flex-grow: 1; }
        
        /* REAL NEWS STYLING */
        .news-item { 
            margin-bottom: 12px; padding: 8px; border: 1px solid #aca899; 
            background: #fff; border-radius: 2px; box-shadow: 1px 1px 0px #fff inset;
        }
        .news-item small { color: #0054e3; font-weight: bold; display: block; margin-bottom: 4px; }
        .news-item a { text-decoration: none; color: #000; font-weight: 500; display: block; }
        .news-item a:hover { text-decoration: underline; color: #0054e3; }

        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: calc(100vh - 35px);
            flex-grow: 1;
            position: relative;
        }

        /* WINDOWS & ICONS (Existing Logic) */
        .icon-container { display: flex; flex-direction: column; gap: 10px; padding: 15px; width: 110px; }
        .icon {
            width: 80px; height: 90px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-shadow: 2px 2px 2px rgba(0,0,0,0.8);
            cursor: pointer; font-size: 11px; text-align: center; border: 1px solid transparent;
            user-select: none;
        }
        .icon img { width: 42px; height: 42px; margin-bottom: 4px; }
        .window {
            position: absolute; min-width: 300px; min-height: 200px;
            background: #ece9d8; border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0; display: none;
            flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white; padding: 0 8px; display: flex;
            justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 13px; height: 30px;
        }
        .window-body { flex-grow: 1; background: white; overflow: hidden; }

        /* TASKBAR */
        .taskbar {
            position: fixed; bottom: 0; width: 100%; height: 35px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex; align-items: center; z-index: 9999;
        }
        .start-btn { height: 100%; cursor: pointer; }
        .news-btn-task { 
            background: #388e3c; color: white; border: 1px solid #1b5e20; 
            font-size: 11px; padding: 4px 12px; cursor: pointer; border-radius: 3px; 
            margin-left: 10px; font-weight: bold; box-shadow: inset 0 1px 1px #81c784;
        }
        .system-tray { margin-left: auto; color: white; background: #0997ff; height: 100%; display: flex; align-items: center; padding: 0 15px; font-size: 12px; }
    </style>
</head>
<body>

<div id="news-sidebar">
    <div class="news-header">
        <span>YXON6 LIVE NEWS</span>
        <span onclick="toggleNews()" style="cursor:pointer;">[X]</span>
    </div>
    <div class="news-content" id="live-news-feed">
        <div class="news-item">Connecting to 2026 data stream...</div>
    </div>
</div>

<div class="desktop">
    <div class="icon-container">
        <div class="icon" onclick="openWindow('browser-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/world-0.png">
            <span>Internet</span>
        </div>
    </div>

    <div id="browser-window" class="window" style="top:70px; left:180px; width:800px; height:550px;" onmousedown="focusWin(this)">
        <div class="window-header" id="browser-window-header">
            <span>NetScape Navigator</span>
            <div onclick="closeWindow('browser-window')" style="cursor:pointer; background:red; padding:2px 8px; border:1px solid white;">X</div>
        </div>
        <div class="window-body">
            <iframe id="browser-frame" src="https://www.bing.com" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>
</div>

<div class="taskbar">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3e/Windows_XP_Start_button.png/150px-Windows_XP_Start_button.png" class="start-btn">
    <button class="news-btn-task" onclick="toggleNews()">LIVE NEWS</button>
    <div class="system-tray" id="clock">12:00 PM</div>
</div>

<script>
    let highestZ = 100;

    function toggleNews() {
        document.getElementById('news-sidebar').classList.toggle('open');
        if(document.getElementById('news-sidebar').classList.contains('open')) {
            updateLiveNews();
        }
    }

    function focusWin(win) {
        highestZ++;
        win.style.zIndex = highestZ;
    }

    function openWindow(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWin(win);
    }

    function closeWindow(id) {
        document.getElementById(id).style.display = 'none';
    }

    // --- REAL-TIME NEWS ENGINE ---
    async function updateLiveNews() {
        const feed = document.getElementById('live-news-feed');
        // Using a public RSS-to-JSON proxy to get real Google News headlines
        const rssUrl = 'https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en';
        const proxy = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        try {
            const response = await fetch(proxy);
            const data = await response.json();
            
            if(data.status === 'ok') {
                feed.innerHTML = '';
                data.items.slice(0, 15).forEach(item => {
                    const date = new Date(item.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `
                        <small>SECURE FEED @ ${date}</small>
                        <a href="${item.link}" target="_blank">${item.title}</a>
                    `;
                    feed.appendChild(div);
                });
            }
        } catch (e) {
            feed.innerHTML = '<div class="news-item">Error: Satellite signal lost.</div>';
        }
    }

    // --- CLOCK ---
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }
    
    setInterval(updateClock, 1000);
    updateClock();
    // Fetch news on load
    updateLiveNews();
</script>

</body>
</html>
