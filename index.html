<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Persistent OS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --win-glass: rgba(255, 255, 255, 0.1); 
            --win-border: rgba(255, 255, 255, 0.2);
            --taskbar-bg: rgba(28, 28, 28, 0.85);
            --accent: #0078d4;
            --panel-bg: rgba(20, 20, 20, 0.7);
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif; }
        body { 
            margin: 0; height: 100vh; 
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover no-repeat; 
            overflow: hidden; color: white; transition: background 0.5s ease;
        }

        /* Desktop Hitboxes */
        #desktop { height: calc(100% - 60px); padding: 20px; display: flex; flex-direction: column; flex-wrap: wrap; align-content: flex-start; gap: 5px; }
        .icon { 
            display: inline-flex; flex-direction: column; align-items: center; cursor: pointer; 
            padding: 10px; border-radius: 6px; text-align: center; width: 90px; transition: 0.1s;
        }
        .icon:hover { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); outline: 1px solid rgba(255,255,255,0.2); }
        .icon img { width: 40px; height: 40px; margin-bottom: 5px; pointer-events: none; }
        .icon span { font-size: 11px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); pointer-events: none; }

        /* Windows */
        .window { 
            position: absolute; background: var(--win-glass); backdrop-filter: blur(30px);
            border-radius: 12px; border: 1px solid var(--win-border); display: none; 
            flex-direction: column; box-shadow: 0 25px 60px rgba(0,0,0,0.5); z-index: 10;
        }
        .win-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: move; font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--win-border); }
        .win-body { flex: 1; background: var(--panel-bg); overflow: hidden; display: flex; flex-direction: column; border-radius: 0 0 12px 12px; }

        /* Chat Styling */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { background: rgba(255,255,255,0.07); padding: 8px 12px; border-radius: 8px; font-size: 13px; border-left: 3px solid var(--accent); }
        .msg-bubble b { display: block; font-size: 10px; color: var(--accent); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
        #chat-input { background: rgba(0,0,0,0.4); border: 1px solid var(--win-border); padding: 12px; margin: 15px; color: white; border-radius: 8px; outline: none; }

        /* Stock Styling */
        .stock-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .stock-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        .price-val { font-family: monospace; color: #2ecc71; }

        /* News Styling */
        #news-list { padding: 10px; overflow-y: auto; }
        .news-card { padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); margin-bottom: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .news-card:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .news-card h4 { margin: 0; font-size: 13px; line-height: 1.4; }

        /* Taskbar */
        #taskbar { 
            position: fixed; bottom: 0; width: 100%; height: 48px; 
            background: var(--taskbar-bg); backdrop-filter: blur(25px);
            display: flex; justify-content: center; align-items: center; gap: 12px; z-index: 1000;
        }
        .t-icon { width: 32px; height: 32px; cursor: pointer; transition: 0.2s; }
        .t-icon:hover { transform: translateY(-4px) scale(1.1); }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="openWin('win-news')"><img src="https://img.icons8.com/color/96/news.png"><span>Live News</span></div>
    <div class="icon" onclick="openWin('win-stocks')"><img src="https://img.icons8.com/color/96/stocks.png"><span>Market</span></div>
    <div class="icon" onclick="openWin('win-chat')"><img src="https://img.icons8.com/color/96/speech-bubble.png"><span>Chat</span></div>
    <div class="icon" onclick="openWin('win-settings')"><img src="https://img.icons8.com/color/96/settings.png"><span>Settings</span></div>
</div>

<div id="win-chat" class="window" style="width: 380px; height: 500px; bottom: 80px; right: 20px;">
    <div class="win-header"><span>Global Lobby</span><span onclick="closeWin('win-chat')" style="cursor:pointer">✕</span></div>
    <div class="win-body">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Type message and hit Enter...">
    </div>
</div>

<div id="win-stocks" class="window" style="width: 400px; height: 500px; top: 50px; left: 150px;">
    <div class="win-header"><span>Market Live</span><span onclick="closeWin('win-stocks')" style="cursor:pointer">✕</span></div>
    <div class="win-body" style="overflow-y:auto;">
        <div class="stock-item">
            <div class="stock-row"><span>Bitcoin (BTC)</span><span id="p-btc" class="price-val">$...</span></div>
            <canvas id="chart-btc" height="100"></canvas>
        </div>
        <div class="stock-item">
            <div class="stock-row"><span>Ethereum (ETH)</span><span id="p-eth" class="price-val">$...</span></div>
            <canvas id="chart-eth" height="100"></canvas>
        </div>
    </div>
</div>

<div id="win-news" class="window" style="width: 450px; height: 550px; top: 100px; right: 100px;">
    <div class="win-header"><span>Live Headlines</span><span onclick="closeWin('win-news')" style="cursor:pointer">✕</span></div>
    <div class="win-body"><div id="news-list">Fetching live news...</div></div>
</div>

<div id="win-settings" class="window" style="width: 320px; height: 350px; top: 20%; left: 35%;">
    <div class="win-header"><span>Settings</span><span onclick="closeWin('win-settings')" style="cursor:pointer">✕</span></div>
    <div class="win-body" style="padding:20px; gap:15px; display:flex; flex-direction:column;">
        <div>
            <label style="font-size:12px; display:block; margin-bottom:5px;">Change Username:</label>
            <input type="text" id="set-name" style="width:100%; padding:8px; background:rgba(0,0,0,0.3); border:1px solid #444; color:white; border-radius:4px;">
        </div>
        <div>
            <label style="font-size:12px; display:block; margin-bottom:5px;">Desktop Wallpaper:</label>
            <input type="file" id="bg-upload" accept="image/*" style="display:none">
            <button onclick="document.getElementById('bg-upload').click()" style="width:100%; padding:10px; background:var(--accent); border:none; color:white; border-radius:6px; cursor:pointer;">Upload Photo</button>
        </div>
        <button onclick="applySettings()" style="margin-top:auto; padding:10px; background:#444; border:none; color:white; border-radius:6px; cursor:pointer;">Apply & Save</button>
    </div>
</div>

<div id="taskbar">
    <img src="https://img.icons8.com/color/48/news.png" class="t-icon" onclick="openWin('win-news')">
    <img src="https://img.icons8.com/color/48/stocks.png" class="t-icon" onclick="openWin('win-stocks')">
    <img src="https://img.icons8.com/color/48/speech-bubble.png" class="t-icon" onclick="openWin('win-chat')">
    <img src="https://img.icons8.com/color/48/settings.png" class="t-icon" onclick="openWin('win-settings')">
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    // --- DATABASE CONFIG ---
    const firebaseConfig = { apiKey: "AI...", databaseURL: "https://..." };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- PERSISTENCE LOGIC ---
    let myName = localStorage.getItem('win_username') || "Guest_" + Math.floor(Math.random()*999);
    document.getElementById('set-name').value = myName;

    function applySettings() {
        const inputName = document.getElementById('set-name').value;
        if(inputName) {
            myName = inputName;
            localStorage.setItem('win_username', myName);
            alert("Settings Saved!");
        }
    }

    document.getElementById('bg-upload').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.body.style.backgroundImage = `url('${ev.target.result}')`;
                localStorage.setItem('win_custom_bg', ev.target.result);
            };
            reader.readAsDataURL(file);
        }
    };
    if(localStorage.getItem('win_custom_bg')) document.body.style.backgroundImage = `url('${localStorage.getItem('win_custom_bg')}')`;

    // --- WINDOW SYSTEM ---
    function openWin(id) { 
        document.getElementById(id).style.display = 'flex'; 
        if(id === 'win-news') fetchNews();
    }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    // --- LIVE STOCKS & GRAPHS ---
    const stockCharts = {};
    function initChart(id, color) {
        return new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: color, tension: 0.4, pointRadius: 0, borderWidth: 2 }] },
            options: { scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
        });
    }
    stockCharts.btc = initChart('chart-btc', '#f39c12');
    stockCharts.eth = initChart('chart-eth', '#3498db');

    async function updateMarket() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
            const data = await res.json();
            refreshStock('btc', data.bitcoin.usd);
            refreshStock('eth', data.ethereum.usd);
        } catch(e){}
    }
    function refreshStock(key, price) {
        document.getElementById(`p-${key}`).innerText = `$${price.toLocaleString()}`;
        const c = stockCharts[key];
        if(c.data.labels.length > 20) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
        c.data.labels.push(""); c.data.datasets[0].data.push(price); c.update();
    }
    setInterval(updateMarket, 10000); updateMarket();

    // --- LIVE NEWS ---
    async function fetchNews() {
        const box = document.getElementById('news-list');
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en');
            const data = await res.json();
            box.innerHTML = data.items.slice(0, 10).map(item => `
                <div class="news-card" onclick="window.open('${item.link}')">
                    <h4>${item.title}</h4>
                    <span style="font-size:10px; opacity:0.6;">${item.pubDate.split(' ')[0]}</span>
                </div>`).join('');
        } catch(e) { box.innerHTML = "News currently unavailable."; }
    }

    // --- CHAT LOGIC (Enter to Send + Persisted Name) ---
    db.ref('global_chat_persist').limitToLast(50).on('value', snap => {
        const area = document.getElementById('chat-messages');
        area.innerHTML = '';
        snap.forEach(m => {
            const d = m.val();
            area.innerHTML += `<div class="msg-bubble"><b>${d.user}</b>${d.msg}</div>`;
        });
        area.scrollTop = area.scrollHeight;
    });

    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && e.target.value.trim() !== "") {
            db.ref('global_chat_persist').push({
                user: myName,
                msg: e.target.value
            });
            e.target.value = '';
        }
    });

    // --- DRAG SYSTEM ---
    let dragItem = null, startX, startY;
    document.querySelectorAll('.win-header').forEach(h => {
        h.onmousedown = (e) => {
            dragItem = h.parentElement;
            startX = e.clientX - dragItem.offsetLeft; startY = e.clientY - dragItem.offsetTop;
            document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
            dragItem.style.zIndex = 100;
        };
    });
    window.onmousemove = (e) => { if(dragItem) { dragItem.style.left = (e.clientX-startX)+'px'; dragItem.style.top = (e.clientY-startY)+'px'; } };
    window.onmouseup = () => dragItem = null;
</script>
</body>
</html>
