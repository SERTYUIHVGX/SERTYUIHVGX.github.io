<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS Web</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { 
            background-color: #008080; 
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: "MS Sans Serif", Arial, sans-serif;
            -webkit-font-smoothing: none;
        }
        .desktop {
            height: calc(100vh - 30px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .icon {
            width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: white;
            font-size: 11px;
            cursor: pointer;
            text-shadow: 1px 1px #000;
        }
        .icon img { width: 32px; height: 32px; margin-bottom: 4px; }
        .icon:active img { filter: brightness(0.5); }

        .taskbar {
            height: 30px;
            background: #c0c0c0;
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 2px;
            box-sizing: border-box;
            border-top: 2px solid #fff;
            z-index: 1000;
        }
        .start-button {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: bold;
            height: 22px;
            padding: 2px 6px;
        }
        .window {
            position: absolute;
            z-index: 10;
            user-select: none;
            display: flex;
            flex-direction: column;
            box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #dfdfdf, inset -2px -2px #808080, inset 2px 2px #fff;
        }
        .title-bar { cursor: move; }
        .window-body {
            flex-grow: 1;
            padding: 0;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* 98 Terminal Menu Bar */
        .terminal-menu {
            display: flex;
            background: #c0c0c0;
            padding: 2px 0;
            border-bottom: 1px solid #808080;
        }
        .menu-item {
            padding: 2px 8px;
            font-size: 11px;
            color: #000;
        }
        .menu-item:first-letter { text-decoration: underline; }

        iframe.app-content {
            width: 100%;
            flex-grow: 1;
            border: none;
            display: block;
        }
    </style>
</head>
<body x-data="{ startMenu: false, yxon6Open: true, internetOpen: false }">

    <div class="desktop">
        <div class="icon" @click="yxon6Open = true">
            <img src="https://win98icons.alexmeub.com/icons/png/msdos-0.png">
            <span>Yxon6 OS</span>
        </div>
        <div class="icon" @click="internetOpen = true">
            <img src="https://win98icons.alexmeub.com/icons/png/msie1-2.png">
            <span>Internet Explorer</span>
        </div>
    </div>

    <div class="window" 
         x-show="yxon6Open" 
         x-draggable 
         style="width: 640px; height: 400px; top: 50px; left: 50px;">
        <div class="title-bar">
            <div class="title-bar-text">MS-DOS Prompt - YXON6</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close" @click="yxon6Open = false"></button>
            </div>
        </div>
        <div class="terminal-menu">
            <div class="menu-item">File</div>
            <div class="menu-item">Edit</div>
            <div class="menu-item">Search</div>
            <div class="menu-item">Help</div>
        </div>
        <div class="window-body">
            <iframe class="app-content" srcdoc="
                <html>
                <head>
                    <style>
                        body { 
                            background-color: #000; 
                            color: #c0c0c0; 
                            margin: 0; 
                            padding: 10px; 
                            font-family: 'Courier New', Courier, monospace; 
                            font-size: 14px;
                            overflow-y: auto;
                        }
                        #output { white-space: pre-wrap; line-height: 1.2; }
                        .input-line { display: flex; margin-top: 10px; }
                        .prompt { color: #c0c0c0; margin-right: 5px; font-weight: bold; }
                        input { 
                            background: transparent; 
                            border: none; 
                            color: #c0c0c0; 
                            font-family: inherit; 
                            font-size: 14px; 
                            outline: none; 
                            flex-grow: 1; 
                        }
                        a { color: #fff; text-decoration: underline; }
                        .header-text { margin-bottom: 15px; color: #fff; }
                    </style>
                </head>
                <body onclick='document.getElementById(&quot;commandInput&quot;).focus()'>
                    <div class='header-text'>Microsoft(R) Windows 98<br>(C)Copyright Microsoft Corp 1981-1998.</div>
                    <div id='output'>YXON6 OS Terminal [Version 4.10.1998]<br>Type 'HELP' for executable commands.</div>
                    <div class='input-line'>
                        <span class='prompt'>C:\YXON6></span>
                        <input type='text' id='commandInput' autofocus autocomplete='off' spellcheck='false'>
                    </div>
                    <script>
                        const database = {
                            'awp': ['https://lessons.axsetubal.pt/', 'https://useawp.developer.li/'],
                            'truffled': ['https://truffled.lol/', 'https://edu.sciencecomputers.lat/'],
                            'help': ['PROXYLIST - View verified directory', 'CLEAR - Wipe screen', 'SPEEDTEST - Test node latency', 'AWP, TRUFFLED, VOID - Service links']
                        };
                        const input = document.getElementById('commandInput');
                        const out = document.getElementById('output');

                        input.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') {
                                const val = input.value.trim();
                                const cmd = val.toLowerCase();
                                
                                const p = document.createElement('div');
                                p.textContent = 'C:\\YXON6> ' + val;
                                out.appendChild(p);

                                if (cmd === 'clear') {
                                    out.innerHTML = '';
                                } else if (cmd === 'help') {
                                    database.help.forEach(line => {
                                        const d = document.createElement('div');
                                        d.textContent = line;
                                        out.appendChild(d);
                                    });
                                } else if (database[cmd]) {
                                    database[cmd].forEach(link => {
                                        const d = document.createElement('div');
                                        d.innerHTML = '> <a href=&quot;' + link + '&quot; target=&quot;_blank&quot;>' + link + '</a>';
                                        out.appendChild(d);
                                    });
                                } else if (val !== '') {
                                    const err = document.createElement('div');
                                    err.textContent = 'Bad command or file name';
                                    out.appendChild(err);
                                }
                                
                                input.value = '';
                                window.scrollTo(0, document.body.scrollHeight);
                            }
                        });
                    </script>
                </body>
                </html>
            "></iframe>
        </div>
    </div>

    <div class="window" x-show="internetOpen" x-draggable style="width: 500px; height: 400px; top: 120px; left: 120px;">
        <div class="title-bar">
            <div class="title-bar-text">Internet Explorer</div>
            <div class="title-bar-controls">
                <button aria-label="Close" @click="internetOpen = false"></button>
            </div>
        </div>
        <div class="window-body" style="background: white;">
            <iframe class="app-content" src="https://www.google.com/search?igu=1"></iframe>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-button" @click="startMenu = !startMenu">
            <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16">
            Start
        </button>
        <div style="flex-grow: 1;"></div>
        <div class="status-bar" style="padding: 2px 10px; box-shadow: inset -1px -1px #fff, inset 1px 1px #808080;">
            <span id="time" style="font-size: 11px;">12:00 PM</span>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.directive('draggable', (el) => {
                let titleBar = el.querySelector('.title-bar');
                titleBar.onmousedown = (e) => {
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
                    el.style.zIndex = 100;
                    let mouseX = e.clientX, mouseY = e.clientY;
                    document.onmousemove = (e) => {
                        let offsetX = mouseX - e.clientX, offsetY = mouseY - e.clientY;
                        mouseX = e.clientX; mouseY = e.clientY;
                        el.style.top = (el.offsetTop - offsetY) + "px";
                        el.style.left = (el.offsetLeft - offsetX) + "px";
                    };
                    document.onmouseup = () => { document.onmousemove = null; };
                }
            });
        });
        function updateClock() {
            document.getElementById('time').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
