<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Live OS - Precision Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --win-glass: rgba(255, 255, 255, 0.1); 
            --win-border: rgba(255, 255, 255, 0.2);
            --taskbar-bg: rgba(28, 28, 28, 0.85);
            --accent: #0078d4;
            --panel-bg: rgba(20, 20, 20, 0.7);
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI Variable', sans-serif; }
        body { 
            margin: 0; height: 100vh; 
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover no-repeat; 
            overflow: hidden; color: white; transition: background 0.5s ease;
        }

        /* --- PRECISION DESKTOP ICONS --- */
        #desktop { 
            height: calc(100% - 60px); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            flex-wrap: wrap; 
            align-content: flex-start; 
            gap: 10px; 
        }

        .icon { 
            display: inline-flex; /* Shrink-wrap to content */
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            padding: 8px; /* Tight padding around icon/text */
            border-radius: 4px; 
            text-align: center; 
            width: 85px; /* Fixed width for alignment, height is dynamic */
            transition: background 0.1s;
            border: 1px solid transparent;
        }

        .icon:hover { 
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .icon img { 
            width: 42px; 
            height: 42px; 
            margin-bottom: 4px; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); 
            pointer-events: none; /* Mouse clicks pass to container */
        }

        .icon span { 
            font-size: 12px; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.8); 
            word-wrap: break-word;
            max-width: 100%;
            pointer-events: none;
        }

        /* --- WINDOWS SYSTEM --- */
        .window { 
            position: absolute; background: var(--win-glass); backdrop-filter: blur(30px);
            border-radius: 12px; border: 1px solid var(--win-border); display: none; 
            flex-direction: column; box-shadow: 0 25px 60px rgba(0,0,0,0.6); z-index: 10;
        }
        .win-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: move; font-weight: 600; font-size: 13px; background: rgba(0,0,0,0.1); border-radius: 12px 12px 0 0; }
        .win-body { flex: 1; background: var(--panel-bg); overflow: hidden; display: flex; flex-direction: column; border-radius: 0 0 12px 12px; }

        /* LIVE NEWS */
        #news-grid { padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .news-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .news-item:hover { background: rgba(255,255,255,0.12); color: var(--accent); }

        /* GLOBAL CHAT */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .chat-bubble { padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.08); font-size: 13px; border: 1px solid rgba(255,255,255,0.05); }
        .chat-bubble b { color: var(--accent); display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 2px; }
        #chat-input { background: rgba(0,0,0,0.3); border: 1px solid var(--win-border); padding: 12px; margin: 15px; color: white; border-radius: 8px; outline: none; }

        /* TASKBAR */
        #taskbar { 
            position: fixed; bottom: 0; width: 100%; height: 48px; 
            background: var(--taskbar-bg); backdrop-filter: blur(25px);
            display: flex; justify-content: center; align-items: center; gap: 10px; z-index: 1000;
        }
        .task-icon { width: 32px; height: 32px; cursor: pointer; transition: transform 0.2s; }
        .task-icon:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="openWin('win-news')"><img src="https://img.icons8.com/color/96/news.png"><span>News</span></div>
    <div class="icon" onclick="openWin('win-stocks')"><img src="https://img.icons8.com/color/96/stocks.png"><span>Market</span></div>
    <div class="icon" onclick="openWin('win-chat')"><img src="https://img.icons8.com/color/96/speech-bubble.png"><span>Chat</span></div>
    <div class="icon" onclick="openWin('win-settings')"><img src="https://img.icons8.com/color/96/settings.png"><span>Settings</span></div>
</div>

<div id="win-news" class="window" style="width: 420px; height: 500px; top: 40px; left: 150px;">
    <div class="win-header"><span>Live Headlines</span><span onclick="closeWin('win-news')" style="cursor:pointer">✕</span></div>
    <div class="win-body"><div id="news-grid">Loading live feeds...</div></div>
</div>

<div id="win-stocks" class="window" style="width: 380px; height: 480px; top: 80px; right: 80px;">
    <div class="win-header"><span>Live Market</span><span onclick="closeWin('win-stocks')" style="cursor:pointer">✕</span></div>
    <div class="win-body" style="overflow-y:auto; padding:15px;">
        <div style="margin-bottom:20px;">
            <div style="display:flex; justify-content:space-between;"><b>Bitcoin</b><span id="btc-price">$--</span></div>
            <canvas id="btcChart" height="100"></canvas>
        </div>
        <div>
            <div style="display:flex; justify-content:space-between;"><b>Ethereum</b><span id="eth-price">$--</span></div>
            <canvas id="ethChart" height="100"></canvas>
        </div>
    </div>
</div>

<div id="win-chat" class="window" style="width: 350px; height: 450px; bottom: 70px; left: 30px;">
    <div class="win-header"><span>Global Chat</span><span onclick="closeWin('win-chat')" style="cursor:pointer">✕</span></div>
    <div class="win-body">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Type a message...">
    </div>
</div>

<div id="win-settings" class="window" style="width: 320px; height: 280px; top: 200px; left: 40%;">
    <div class="win-header"><span>Settings</span><span onclick="closeWin('win-settings')" style="cursor:pointer">✕</span></div>
    <div class="win-body" style="padding:20px; gap:10px; display:flex; flex-direction:column;">
        <label style="font-size:12px; opacity:0.8;">Background Image:</label>
        <input type="file" id="bg-input" accept="image/*" style="display:none">
        <button onclick="document.getElementById('bg-input').click()" style="background:var(--accent); border:none; color:white; padding:10px; border-radius:6px; cursor:pointer;">Upload from Library</button>
        <label style="font-size:12px; opacity:0.8; margin-top:10px;">Display Name:</label>
        <input type="text" id="user-name-input" style="background:rgba(0,0,0,0.5); border:1px solid #444; color:white; padding:8px; border-radius:4px;">
        <button onclick="saveProfile()" style="background:#444; border:none; color:white; padding:8px; border-radius:6px; cursor:pointer;">Save Profile</button>
    </div>
</div>

<div id="taskbar">
    <img src="https://img.icons8.com/color/48/news.png" class="task-icon" onclick="openWin('win-news')">
    <img src="https://img.icons8.com/color/48/stocks.png" class="task-icon" onclick="openWin('win-stocks')">
    <img src="https://img.icons8.com/color/48/speech-bubble.png" class="task-icon" onclick="openWin('win-chat')">
    <img src="https://img.icons8.com/color/48/settings.png" class="task-icon" onclick="openWin('win-settings')">
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    // --- FIREBASE (Replace with your actual keys to enable real-time sync) ---
    const firebaseConfig = { apiKey: "AI...", databaseURL: "https://..." };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = localStorage.getItem('os_user') || "User_" + Math.floor(Math.random()*999);
    document.getElementById('user-name-input').value = myName;

    // --- WINDOW MGMT ---
    function openWin(id) { 
        document.getElementById(id).style.display = 'flex'; 
        if(id === 'win-news') loadNews();
    }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    // --- PHOTO LIBRARY BACKGROUND ---
    document.getElementById('bg-input').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.body.style.backgroundImage = `url('${ev.target.result}')`;
                localStorage.setItem('os_custom_bg', ev.target.result);
            };
            reader.readAsDataURL(file);
        }
    };
    if(localStorage.getItem('os_custom_bg')) document.body.style.backgroundImage = `url('${localStorage.getItem('os_custom_bg')}')`;

    // --- LIVE NEWS ---
    async function loadNews() {
        const grid = document.getElementById('news-grid');
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en');
            const data = await res.json();
            grid.innerHTML = '';
            data.items.slice(0, 10).forEach(item => {
                grid.innerHTML += `<div class="news-item" onclick="window.open('${item.link}')">${item.title}</div>`;
            });
        } catch(e) { grid.innerHTML = "News currently unavailable."; }
    }

    // --- GLOBAL CHAT ---
    db.ref('global_v3').limitToLast(40).on('value', snap => {
        const box = document.getElementById('chat-messages');
        box.innerHTML = '';
        snap.forEach(m => {
            box.innerHTML += `<div class="chat-bubble"><b>${m.val().u}</b>${m.val().t}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    document.getElementById('chat-input').onkeypress = (e) => {
        if(e.key === 'Enter' && e.target.value) {
            db.ref('global_v3').push({ u: myName, t: e.target.value });
            e.target.value = '';
        }
    };
    function saveProfile() {
        myName = document.getElementById('user-name-input').value;
        localStorage.setItem('os_user', myName);
        alert("Profile Updated");
    }

    // --- LIVE MARKET ---
    const charts = {};
    const setupChart = (id, color) => new Chart(document.getElementById(id), {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: color, tension: 0.4, pointRadius: 0 }] },
        options: { scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
    });
    charts.btc = setupChart('btcChart', '#f39c12');
    charts.eth = setupChart('ethChart', '#3498db');

    async function syncMarket() {
        try {
            const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
            const d = await r.json();
            updateChart('btc', d.bitcoin.usd);
            updateChart('eth', d.ethereum.usd);
        } catch(e){}
    }
    function updateChart(key, price) {
        document.getElementById(`${key}-price`).innerText = `$${price.toLocaleString()}`;
        const c = charts[key];
        if(c.data.labels.length > 15) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
        c.data.labels.push(""); c.data.datasets[0].data.push(price); c.update();
    }
    setInterval(syncMarket, 10000); syncMarket();

    // --- DRAG LOGIC ---
    let dragObj = null, offX, offY;
    document.querySelectorAll('.win-header').forEach(h => {
        h.onmousedown = (e) => {
            dragObj = h.parentElement;
            offX = e.clientX - dragObj.offsetLeft; offY = e.clientY - dragObj.offsetTop;
            document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
            dragObj.style.zIndex = 100;
        };
    });
    window.onmousemove = (e) => { if(dragObj) { dragObj.style.left = (e.clientX-offX)+'px'; dragObj.style.top = (e.clientY-offY)+'px'; } };
    window.onmouseup = () => dragObj = null;
</script>
</body>
</html>
