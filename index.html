<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Clone</title>
    <style>
        /* --- CSS STYLES --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: "Tahoma", "Segoe UI", sans-serif;
        }

        .desktop {
            background: #3a6ea5 url('https://e0.pxfuel.com/wallpapers/315/518/desktop-wallpaper-windows-xp-bliss-windows-xp-original.jpg') no-repeat center center;
            background-size: cover;
            height: calc(100vh - 30px);
            position: relative;
        }

        /* The Window */
        .window {
            position: absolute;
            top: 100px;
            left: 100px;
            width: 350px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.3);
            user-select: none;
        }

        .title-bar {
            background: linear-gradient(to bottom, #0058e4 0%, #3d95ff 10%, #0058e4 100%);
            padding: 3px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px #000;
            cursor: move; /* Indicates it can be dragged */
        }

        .title-controls button {
            width: 21px;
            height: 21px;
            margin-left: 2px;
            background: #ece9d8;
            border: 1px solid #fff;
            border-radius: 2px;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
        }

        .title-controls .close {
            background: linear-gradient(to bottom, #e76b39, #ad3100);
            color: white;
        }

        .window-body {
            padding: 10px;
            background: white;
            margin: 2px;
            border: 1px solid #7f9db9;
        }

        textarea {
            width: 100%;
            height: 150px;
            border: none;
            resize: none;
            outline: none;
            font-family: "Courier New", monospace;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 30px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex;
            align-items: center;
            z-index: 1000;
        }

        .start-button {
            height: 100%;
            padding: 0 20px;
            background: radial-gradient(circle at top left, #53a351, #388e3c);
            color: white;
            font-style: italic;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        .system-tray {
            margin-left: auto;
            background: #0996f1;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            font-size: 11px;
            border-left: 1px solid #0840a5;
        }
    </style>
</head>
<body>

    <div class="desktop">
        <div id="myWindow" class="window">
            <div id="myWindowHeader" class="title-bar">
                <div class="title-text">Notepad</div>
                <div class="title-controls">
                    <button>_</button>
                    <button>□</button>
                    <button class="close">X</button>
                </div>
            </div>
            <div class="window-body">
                <textarea>Welcome to Windows XP.
Feel free to drag this window around!</textarea>
            </div>
        </div>
    </div>

    <div class="taskbar">
        <div class="start-button">start</div>
        <div class="system-tray">
            <span id="clock"></span>
        </div>
    </div>

    <script>
        // --- JAVASCRIPT FOR DRAGGING ---
        dragElement(document.getElementById("myWindow"));

        function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (document.getElementById(elmnt.id + "Header")) {
                document.getElementById(elmnt.id + "Header").onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // Live Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
