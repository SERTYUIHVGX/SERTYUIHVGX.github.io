<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Edition OS - Command Active</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --win-glass: rgba(15, 15, 15, 0.9); 
            --win-border: rgba(212, 175, 55, 0.4);
            --taskbar-bg: rgba(10, 10, 10, 0.98);
            --accent: #d4af37;
            --panel-bg: #050505;
            --text: #ffffff;
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI Variable', sans-serif; }
        body { 
            margin: 0; height: 100vh; 
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%); 
            overflow: hidden; color: var(--text);
        }

        /* TIGHT HITBOX ICONS */
        #desktop { height: calc(100% - 60px); padding: 20px; display: flex; flex-direction: column; flex-wrap: wrap; align-content: flex-start; gap: 10px; }
        .icon { 
            display: inline-flex; flex-direction: column; align-items: center; cursor: pointer; 
            padding: 8px; border-radius: 6px; text-align: center; width: 85px; 
            transition: all 0.2s; border: 1px solid transparent;
        }
        .icon:hover { 
            background: rgba(212, 175, 55, 0.1); 
            border: 1px solid var(--accent);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        .icon img { width: 40px; height: 40px; margin-bottom: 4px; pointer-events: none; }
        .icon span { font-size: 11px; text-shadow: 0 2px 4px #000; pointer-events: none; color: var(--accent); }

        /* WINDOWS */
        .window { 
            position: absolute; background: var(--win-glass); backdrop-filter: blur(20px);
            border-radius: 8px; border: 1px solid var(--win-border); display: none; 
            flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.9); z-index: 10;
        }
        .win-header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            cursor: move; font-weight: bold; font-size: 11px; color: var(--accent);
            border-bottom: 1px solid var(--win-border); background: rgba(0,0,0,0.5);
        }
        .win-body { flex: 1; background: var(--panel-bg); overflow: hidden; display: flex; flex-direction: column; }

        /* CHAT */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 6px; font-size: 13px; border-left: 2px solid var(--accent); }
        .msg-bubble b { display: block; font-size: 10px; color: var(--accent); margin-bottom: 2px; }
        #chat-input { background: #000; border: 1px solid var(--win-border); padding: 12px; margin: 15px; color: white; border-radius: 6px; outline: none; }

        /* STOCKS */
        .stock-item { padding: 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .price-val { font-family: monospace; color: var(--accent); font-size: 1.2em; }

        /* TASKBAR */
        #taskbar { 
            position: fixed; bottom: 0; width: 100%; height: 50px; 
            background: var(--taskbar-bg); border-top: 1px solid var(--win-border);
            display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 1000;
        }
        .t-icon { width: 32px; height: 32px; cursor: pointer; transition: 0.2s; filter: drop-shadow(0 0 2px var(--accent)); }
        .t-icon:hover { transform: translateY(-3px); filter: drop-shadow(0 0 8px var(--accent)); }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="openWin('win-news')"><img src="https://img.icons8.com/fluency/96/news.png"><span>News</span></div>
    <div class="icon" onclick="openWin('win-stocks')"><img src="https://img.icons8.com/fluency/96/bullish.png"><span>Stocks</span></div>
    <div class="icon" onclick="openWin('win-chat')"><img src="https://img.icons8.com/fluency/96/chat.png"><span>Chat</span></div>
    <div class="icon" onclick="openWin('win-settings')"><img src="https://img.icons8.com/fluency/96/services.png"><span>Settings</span></div>
</div>

<div id="win-chat" class="window" style="width: 350px; height: 450px; bottom: 70px; right: 20px;">
    <div class="win-header"><span>GOLD MESSENGER</span><span onclick="closeWin('win-chat')" style="cursor:pointer">✕</span></div>
    <div class="win-body">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Type and hit Enter to send...">
    </div>
</div>

<div id="win-stocks" class="window" style="width: 380px; height: 480px; top: 50px; left: 150px;">
    <div class="win-header"><span>LIVE MARKET</span><span onclick="closeWin('win-stocks')" style="cursor:pointer">✕</span></div>
    <div class="win-body">
        <div class="stock-item">
            <div style="display:flex; justify-content:space-between;"><b>BTC/USD</b><span id="p-btc" class="price-val">$...</span></div>
            <canvas id="chart-btc" height="80"></canvas>
        </div>
        <div class="stock-item">
            <div style="display:flex; justify-content:space-between;"><b>ETH/USD</b><span id="p-eth" class="price-val">$...</span></div>
            <canvas id="chart-eth" height="80"></canvas>
        </div>
    </div>
</div>

<div id="win-settings" class="window" style="width: 300px; height: 320px; top: 25%; left: 35%;">
    <div class="win-header"><span>SYSTEM SETTINGS</span><span onclick="closeWin('win-settings')" style="cursor:pointer">✕</span></div>
    <div class="win-body" style="padding:20px; display:flex; flex-direction:column; gap:15px;">
        <label style="font-size:10px; color:var(--accent);">USERNAME</label>
        <input type="text" id="set-name" style="background:#000; border:1px solid var(--win-border); color:white; padding:10px; border-radius:4px;">
        <label style="font-size:10px; color:var(--accent);">WALLPAPER</label>
        <input type="file" id="bg-upload" accept="image/*" style="display:none">
        <button onclick="document.getElementById('bg-upload').click()" style="background:#111; color:var(--accent); border:1px solid var(--accent); padding:10px; cursor:pointer;">UPLOAD PHOTO</button>
        <button onclick="applySettings()" style="background:var(--accent); color:#000; border:none; padding:10px; font-weight:bold; cursor:pointer; margin-top:10px;">SAVE PROFILE</button>
    </div>
</div>

<div id="taskbar">
    <img src="https://img.icons8.com/fluency/48/news.png" class="t-icon" onclick="openWin('win-news')">
    <img src="https://img.icons8.com/fluency/48/bullish.png" class="t-icon" onclick="openWin('win-stocks')">
    <img src="https://img.icons8.com/fluency/48/chat.png" class="t-icon" onclick="openWin('win-chat')">
    <img src="https://img.icons8.com/fluency/48/services.png" class="t-icon" onclick="openWin('win-settings')">
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    // --- DATABASE ---
    const firebaseConfig = { apiKey: "AI...", databaseURL: "https://..." };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- PERSISTENCE ---
    let myName = localStorage.getItem('gold_user') || "User_" + Math.floor(Math.random()*99);
    document.getElementById('set-name').value = myName;

    function applySettings() {
        myName = document.getElementById('set-name').value;
        localStorage.setItem('gold_user', myName);
        alert("Identity Updated");
    }

    document.getElementById('bg-upload').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.body.style.background = `url('${ev.target.result}') center/cover no-repeat`;
                localStorage.setItem('gold_bg', ev.target.result);
            };
            reader.readAsDataURL(file);
        }
    };
    if(localStorage.getItem('gold_bg')) document.body.style.background = `url('${localStorage.getItem('gold_bg')}') center/cover no-repeat`;

    // --- COMMAND ON ENTER (CHAT) ---
    document.getElementById('chat-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); // Prevents line breaks
            const msg = this.value.trim();
            if (msg !== "") {
                db.ref('gold_chat_system').push({
                    user: myName, 
                    msg: msg
                });
                this.value = ''; // Clear input
            }
        }
    });

    db.ref('gold_chat_system').limitToLast(30).on('value', snap => {
        const area = document.getElementById('chat-messages');
        area.innerHTML = '';
        snap.forEach(m => {
            area.innerHTML += `<div class="msg-bubble"><b>${m.val().user}</b>${m.val().msg}</div>`;
        });
        area.scrollTop = area.scrollHeight;
    });

    // --- STOCKS & GRAPHS ---
    const charts = {};
    const initChart = (id) => new Chart(document.getElementById(id), {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: '#d4af37', tension: 0.4, pointRadius: 0 }] },
        options: { scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
    });
    charts.btc = initChart('chart-btc');
    charts.eth = initChart('chart-eth');

    async function updateMarket() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
            const data = await res.json();
            ['btc', 'eth'].forEach(k => {
                const price = k === 'btc' ? data.bitcoin.usd : data.ethereum.usd;
                document.getElementById(`p-${k}`).innerText = `$${price.toLocaleString()}`;
                const c = charts[k];
                if(c.data.labels.length > 20) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
                c.data.labels.push(""); c.data.datasets[0].data.push(price); c.update();
            });
        } catch(e){}
    }
    setInterval(updateMarket, 8000); updateMarket();

    // --- OS CORE ---
    function openWin(id) { document.getElementById(id).style.display = 'flex'; }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    let dragItem = null, startX, startY;
    document.querySelectorAll('.win-header').forEach(h => {
        h.onmousedown = (e) => {
            dragItem = h.parentElement;
            startX = e.clientX - dragItem.offsetLeft; startY = e.clientY - dragItem.offsetTop;
            document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
            dragItem.style.zIndex = 100;
        };
    });
    window.onmousemove = (e) => { if(dragItem) { dragItem.style.left = (e.clientX-startX)+'px'; dragItem.style.top = (e.clientY-startY)+'px'; } };
    window.onmouseup = () => dragItem = null;
</script>
</body>
</html>
