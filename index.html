I’ve updated the code to the **Red and Black** theme as requested. I also updated the initial boot message and the window title to reflect **"Yxon6 OS"**. 

```html
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Yxon6 OS - Terminal</title> 
    <style> 
        body { 
            background-color: #000; 
            color: #ff0000; 
            font-family: 'Courier New', Courier, monospace; 
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
            text-shadow: 0 0 5px #ff0000; 
            overflow: hidden; 
        } 
        #terminal { 
            height: 100%; 
            overflow-y: auto; 
            scrollbar-width: none; 
        } 
        #terminal::-webkit-scrollbar { 
            display: none; 
        } 
        #output { 
            white-space: pre-wrap; 
            margin-bottom: 40px; 
        } 
        .input-line { 
            display: flex; 
            align-items: center; 
        } 
        .prompt { 
            margin-right: 10px; 
            white-space: nowrap; 
        } 
        input { 
            background: transparent; 
            border: none; 
            color: #ff0000; 
            font-family: inherit; 
            font-size: inherit; 
            outline: none; 
            flex-grow: 1; 
            text-shadow: 0 0 5px #ff0000; 
            caret-color: #ff0000; 
        } 
        a { 
            color: #fff; 
            text-decoration: underline; 
        } 
        .scanlines { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 0, 0, 0.01), rgba(255, 0, 0, 0.03)); 
            z-index: 10; 
            background-size: 100% 3px, 3px 100%; 
            pointer-events: none; 
        } 
    </style> 
</head> 
<body onclick="document.getElementById('commandInput').focus()"> 
    <div class="scanlines"></div> 
    <div id="terminal"> 
        <div id="output">YXON6 OS [Version 1.0.4]
SYSTEM ONLINE... TYPE 'proxylist' TO VIEW DIRECTORY.</div> 
        <div class="input-line"> 
            <span class="prompt">yxon6@root:~$</span> 
            <input type="text" id="commandInput" autofocus autocomplete="off" spellcheck="false"> 
        </div> 
    </div> 
    <script> 
        const input = document.getElementById('commandInput'); 
        const output = document.getElementById('output'); 
        const terminal = document.getElementById('terminal'); 
        
        const database = { 
            "awp": [" https://lessons.axsetubal.pt/", "https://useawp.developer.li//", " https://api.incatel.cl/", " https://useawp.7s.com.tr/"], 
            "truffled": [" https://edu.sciencecomputers.lat/", " https://truffled.lol/", " https://ee.rxtech.cl/", " https://infoo.infotechnology.com/"], 
            "void.network": [" https://awesome.martinwguy.net/?/", " https://strange.martinwguy.net/?/"], 
            "quasar": [" https://epic.tomaszu.com/", " https://eglobaleducation.com/"], 
            "vapour": [" https://watervapor.space/", " https://education-live.com/"], 
            "boredom": [" https://pn.boredom.apertura.com/", " https://doxwind.xyz/", " https://wispserver.dev/"], 
            "koopbin": [" https://koopbin.site/", " https://learnster.online/"], 
            "nebula": [" https://math.school.dovereducation.org/", " http://clever.com.elmhoneyheath.recepist.com/"], 
            "afilite": [" https://readinghelpforelementary.online/"], 
            "splash": [" https://cullinary-schools.ks11.ru/", " https://darkn.ks11.ru/", " https://splashstudy.b-cdn.net/", " https://94a80745.splashcli.pages.dev/", " https://splsh.paladinmining.net/"] 
        }; 

        input.addEventListener('keydown', function(e) { 
            if (e.key === 'Enter') { 
                const rawVal = input.value.trim(); 
                const cmd = rawVal.toLowerCase(); 
                printLine(`yxon6@root:~$ ${rawVal}`); 
                
                if (cmd === 'proxylist') { 
                    printLine("\n[ YXON6 DIRECTORY ]"); 
                    Object.keys(database).forEach(key => printLine(`- ${key.toUpperCase()}`)); 
                } else if (database[cmd]) { 
                    printLine(`\nRETRIEVING ENDPOINTS FOR [${cmd.toUpperCase()}]...`); 
                    database[cmd].forEach(link => printLink(link)); 
                } else if (cmd === 'help' || cmd === 'about') { 
                    printLine("\n[ YXON6 OS INFO ]\nCommands: proxylist, clear, help\nSelect a directory name to bridge connections.\n"); 
                } else if (cmd === 'clear') { 
                    output.innerHTML = ''; 
                } else if (cmd !== '') { 
                    printLine(`ERR: '${rawVal}' is not recognized as an internal command.`); 
                } 
                
                input.value = ''; 
                setTimeout(() => { 
                    terminal.scrollTo({ top: terminal.scrollHeight, behavior: 'smooth' }); 
                }, 10); 
            } 
        }); 

        function printLine(text) { 
            const div = document.createElement('div'); 
            div.textContent = text; 
            output.appendChild(div); 
        } 

        function printLink(url) { 
            const div = document.createElement('div'); 
            const a = document.createElement('a'); 
            a.href = url; 
            a.target = "_blank"; 
            a.textContent = `> CONNECTION ESTABLISHED: ${url}`; 
            div.appendChild(a); 
            output.appendChild(div); 
        } 
    </script> 
</body> 
</html>
