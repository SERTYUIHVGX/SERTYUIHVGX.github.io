<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yxoncord OS - Secure ID Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-blur: blur(20px); --win-bg: rgba(30, 31, 34, 0.9); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; height: 100vh; background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover; overflow: hidden; color: white; }
        
        #desktop { height: calc(100% - 60px); padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, 100px); gap: 20px; }
        .desktop-item { cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .desktop-item img { width: 50px; margin-bottom: 5px; }

        .window { position: absolute; background: var(--win-bg); border-radius: 12px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); z-index: 10; backdrop-filter: var(--bg-blur); }
        .win-header { padding: 10px 15px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; cursor: move; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .win-content { flex: 1; display: flex; overflow: hidden; }

        /* Yxoncord UI */
        #yxon-sidebar { width: 72px; background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 10px; }
        #yxon-channels { width: 200px; background: #2b2d31; padding: 15px; border-right: 1px solid rgba(0,0,0,0.2); }
        #yxon-chat { flex: 1; background: #313338; display: flex; flex-direction: column; }
        .srv-btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; color: white; background: #313338; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .srv-btn:hover, .srv-btn.active { border-radius: 15px; background: #5865f2; }
        
        .chan-item { padding: 8px; border-radius: 5px; cursor: pointer; color: #949ba4; margin-bottom: 2px; }
        .chan-item:hover { background: #35373c; color: white; }
        .chan-item.active { background: #3f4147; color: white; }
        .chan-item::before { content: "# "; }

        #msg-flow { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; }
        .msg-input { background: #383a40; border: none; margin: 15px; padding: 12px; border-radius: 8px; color: white; outline: none; }
        
        /* User Info Bar */
        #user-bar { background: #232428; padding: 10px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .user-tag { color: #b5bac1; font-size: 10px; }

        /* Market UI */
        #market-container { padding: 15px; width: 100%; overflow-y: auto; background: #111; }
        .stock-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        canvas { max-height: 80px; margin-bottom: 20px; }

        #taskbar { position: fixed; bottom: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px; gap: 15px; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="desktop-item" onclick="openWin('win-yxon')"><img src="https://img.icons8.com/color/96/discord-new-logo.png"><span>Yxoncord</span></div>
    <div class="desktop-item" onclick="openWin('win-stocks')"><img src="https://img.icons8.com/color/96/stocks.png"><span>Market</span></div>
</div>

<div id="win-yxon" class="window" style="width: 900px; height: 600px; top: 50px; left: 100px;">
    <div class="win-header"><span id="yxon-title">Yxoncord Pro</span><span onclick="closeWin('win-yxon')" style="cursor:pointer">✕</span></div>
    <div class="win-content">
        <div id="yxon-sidebar">
            <button class="srv-btn" onclick="addServer()" style="background:#23a559;">+</button>
            <button class="srv-btn" onclick="joinServer()" style="background:#4e5058;">🔑</button>
            <div id="srv-list"></div>
        </div>
        <div id="yxon-channels">
            <div style="font-size: 11px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between;">
                CHANNELS <span onclick="addChannel()" style="cursor:pointer; color:#23a559;">+</span>
            </div>
            <div id="chan-list"></div>
            <div style="flex:1"></div>
            <div id="user-bar">
                <div style="font-weight:bold;"><span id="display-name">...</span><br><span class="user-tag" id="display-id">#0000</span></div>
            </div>
        </div>
        <div id="yxon-chat">
            <div id="msg-flow">Select a channel to begin.</div>
            <input type="text" id="chat-in" class="msg-input" placeholder="Message..." disabled>
        </div>
    </div>
</div>

<div id="win-stocks" class="window" style="width: 400px; height: 500px; top: 80px; left: 450px;">
    <div class="win-header"><span>Live Market</span><span onclick="closeWin('win-stocks')" style="cursor:pointer">✕</span></div>
    <div class="win-content">
        <div id="market-container">
            <div class="stock-row"><b>Bitcoin (BTC)</b> <span id="btc-price">$...</span></div>
            <canvas id="btcChart"></canvas>
            <div class="stock-row"><b>Ethereum (ETH)</b> <span id="eth-price">$...</span></div>
            <canvas id="ethChart"></canvas>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    // --- FIREBASE SETUP ---
    const firebaseConfig = { apiKey: "YOUR_API_KEY", databaseURL: "https://YOUR_PROJECT.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- IDENTITY SYSTEM ---
    let myUID = localStorage.getItem('yxon_uid') || 'u' + Math.random().toString(36).substr(2, 9);
    let myUsername = localStorage.getItem('yxon_user');

    async function login() {
        if (!myUsername) {
            let name = prompt("Choose a Username:");
            if (!name) return login();
            
            // Check if username is taken
            const snapshot = await db.ref('yxon/users/' + name.toLowerCase()).once('value');
            if (snapshot.exists() && snapshot.val() !== myUID) {
                alert("That username is already taken! Try another.");
                return login();
            }

            // Register username to this UID
            await db.ref('yxon/users/' + name.toLowerCase()).set(myUID);
            myUsername = name;
            localStorage.setItem('yxon_user', name);
            localStorage.setItem('yxon_uid', myUID);
        }
        
        document.getElementById('display-name').innerText = myUsername;
        document.getElementById('display-id').innerText = "#" + myUID.substring(1, 5).toUpperCase();
    }
    login();

    // --- OS & DRAGGING ---
    function openWin(id) { document.getElementById(id).style.display = 'flex'; }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    document.querySelectorAll('.win-header').forEach(h => {
        h.onmousedown = (e) => {
            let win = h.closest('.window');
            let ox = e.clientX - win.offsetLeft, oy = e.clientY - win.offsetTop;
            document.onmousemove = (m) => { win.style.left = (m.clientX-ox)+'px'; win.style.top = (m.clientY-oy)+'px'; };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    // --- YXONCORD CORE ---
    let curSrv = null, curChan = null;

    function getInitials(name) {
        return name.split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 3);
    }

    function addServer() {
        let name = prompt("Server Name:");
        if(name) {
            let id = 'srv_' + Math.random().toString(36).substr(2, 5);
            db.ref('yxon/servers/'+id).set({ name, owner: myUsername });
            db.ref('yxon/channels/'+id).push({ name: 'general' });
        }
    }

    function joinServer() {
        let id = prompt("Enter Server ID:");
        if(id) db.ref('yxon/servers/'+id).once('value', s => s.exists() ? loadServer(id) : alert("Invalid ID"));
    }

    function addChannel() {
        if(!curSrv) return;
        let name = prompt("Channel Name:");
        if(name) db.ref('yxon/channels/'+curSrv).push({ name: name.toLowerCase().replace(/\s/g, '-') });
    }

    db.ref('yxon/servers').on('value', snap => {
        let ui = document.getElementById('srv-list'); ui.innerHTML = '';
        snap.forEach(s => {
            let b = document.createElement('button');
            b.className = 'srv-btn' + (curSrv === s.key ? ' active' : '');
            b.innerText = getInitials(s.val().name);
            b.title = `ID: ${s.key}`; // Hover to see ID
            b.onclick = () => loadServer(s.key);
            ui.appendChild(b);
        });
    });

    function loadServer(id) {
        curSrv = id;
        db.ref('yxon/channels/'+id).on('value', snap => {
            let ui = document.getElementById('chan-list'); ui.innerHTML = '';
            snap.forEach(c => {
                let d = document.createElement('div');
                d.className = 'chan-item' + (curChan === c.key ? ' active' : '');
                d.innerText = c.val().name;
                d.onclick = () => loadChannel(c.key, c.val().name);
                ui.appendChild(d);
            });
        });
    }

    function loadChannel(id, name) {
        curChan = id;
        document.getElementById('chat-in').disabled = false;
        document.getElementById('chat-in').placeholder = `Message #${name}`;
        db.ref('yxon/msgs/'+id).off();
        db.ref('yxon/msgs/'+id).on('value', snap => {
            let flow = document.getElementById('msg-flow'); flow.innerHTML = '';
            snap.forEach(m => {
                let data = m.val();
                flow.innerHTML += `<div><b style="color:#5865f2">${data.u}</b>: ${data.t}</div>`;
            });
            flow.scrollTop = flow.scrollHeight;
        });
    }

    document.getElementById('chat-in').onkeypress = (e) => {
        if(e.key === 'Enter' && e.target.value) {
            db.ref('yxon/msgs/'+curChan).push({ u: myUsername, t: e.target.value });
            e.target.value = '';
        }
    };

    // --- MARKET API ---
    const btcChart = new Chart(document.getElementById('btcChart'), { type: 'line', data: { labels: [], datasets: [{ label: 'BTC', data: [], borderColor: '#f0b232' }] } });
    const ethChart = new Chart(document.getElementById('ethChart'), { type: 'line', data: { labels: [], datasets: [{ label: 'ETH', data: [], borderColor: '#627eea' }] } });

    async function updateMarket() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
            const data = await res.json();
            document.getElementById('btc-price').innerText = `$${data.bitcoin.usd.toLocaleString()}`;
            document.getElementById('eth-price').innerText = `$${data.ethereum.usd.toLocaleString()}`;
            
            [btcChart, ethChart].forEach((c, i) => {
                let price = i === 0 ? data.bitcoin.usd : data.ethereum.usd;
                if(c.data.labels.length > 15) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
                c.data.labels.push(""); c.data.datasets[0].data.push(price);
                c.update();
            });
        } catch(e) {}
    }
    setInterval(updateMarket, 10000); updateMarket();
</script>
</body>
</html>
