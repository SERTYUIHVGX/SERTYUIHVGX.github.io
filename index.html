<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS Web</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { 
            background-color: #008080; 
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: "MS Sans Serif", Arial, sans-serif;
            -webkit-font-smoothing: none;
        }
        .desktop {
            height: calc(100vh - 30px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-wrap: wrap;
        }
        .icon {
            width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: white;
            font-size: 11px;
            cursor: pointer;
            text-shadow: 1px 1px #000;
        }
        .icon img { width: 32px; height: 32px; margin-bottom: 4px; }
        .icon:active img { filter: brightness(0.5); }

        .window {
            position: absolute;
            z-index: 10;
            user-select: none;
            display: flex;
            flex-direction: column;
            box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #dfdfdf, inset -2px -2px #808080, inset 2px 2px #fff;
        }
        .title-bar { cursor: move; }
        .window-body { flex-grow: 1; padding: 0; margin: 0; overflow: hidden; display: flex; flex-direction: column; }

        /* Fears to Fathom Map Styling */
        .map-container {
            background: #2a2a24;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Grain/CRT Overlay Effect */
        .map-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            pointer-events: none;
            z-index: 5;
        }
        .louisiana-map {
            width: 90%;
            filter: sepia(0.8) contrast(1.2) brightness(0.7) grayscale(0.3);
            border: 1px solid #444;
        }
        .map-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #d4d4bc;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .taskbar {
            height: 30px;
            background: #c0c0c0;
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 2px;
            box-sizing: border-box;
            border-top: 2px solid #fff;
            z-index: 1000;
        }
        .start-button { display: flex; align-items: center; gap: 4px; font-weight: bold; height: 22px; padding: 2px 6px; }
    </style>
</head>
<body x-data="{ startMenu: false, yxon6Open: false, internetOpen: false, mapOpen: true }">

    <div class="desktop">
        <div class="icon" @click="yxon6Open = true">
            <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-5.png">
            <span>Yxon6 OS</span>
        </div>
        <div class="icon" @click="mapOpen = true">
            <img src="https://win98icons.alexmeub.com/icons/png/world-3.png">
            <span>State Map</span>
        </div>
        <div class="icon" @click="internetOpen = true">
            <img src="https://win98icons.alexmeub.com/icons/png/msie1-2.png">
            <span>Internet Explorer</span>
        </div>
    </div>

    <div class="window" x-show="mapOpen" x-draggable style="width: 500px; height: 450px; top: 80px; left: 300px;">
        <div class="title-bar">
            <div class="title-bar-text">Map Viewer - Louisiana_Sector_04.bmp</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close" @click="mapOpen = false"></button>
            </div>
        </div>
        <div class="window-body">
            <div class="map-container">
                <div class="map-overlay"></div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Map_of_Louisiana_NA.svg/800px-Map_of_Louisiana_NA.svg.png" class="louisiana-map">
                <div class="map-label">Coordinates: 30.9843° N, 91.9623° W<br>IRONBARK RANGE AREA</div>
            </div>
        </div>
    </div>

    <div class="window" x-show="yxon6Open" x-draggable style="width: 600px; height: 350px; top: 40px; left: 40px;">
        <div class="title-bar">
            <div class="title-bar-text">MS-DOS Prompt - YXON6</div>
            <div class="title-bar-controls">
                <button aria-label="Close" @click="yxon6Open = false"></button>
            </div>
        </div>
        <div class="window-body">
            <iframe style="width:100%; height:100%; border:none;" srcdoc="
                <body style='background:#000; color:#c0c0c0; font-family:monospace; padding:10px;'>
                    <div>Microsoft(R) Windows 98 [YXON6 Edition]</div>
                    <div style='margin-top:10px;'>C:\YXON6> <span style='border-right: 8px solid #c0c0c0;'>&nbsp;</span></div>
                </body>
            "></iframe>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-button" @click="startMenu = !startMenu">
            <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16">
            Start
        </button>
        <div style="flex-grow: 1;"></div>
        <div class="status-bar" style="padding: 2px 10px; box-shadow: inset -1px -1px #fff, inset 1px 1px #808080;">
            <span id="time" style="font-size: 11px;">12:00 PM</span>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.directive('draggable', (el) => {
                let titleBar = el.querySelector('.title-bar');
                titleBar.onmousedown = (e) => {
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
                    el.style.zIndex = 100;
                    let mouseX = e.clientX, mouseY = e.clientY;
                    document.onmousemove = (e) => {
                        let offsetX = mouseX - e.clientX, offsetY = mouseY - e.clientY;
                        mouseX = e.clientX; mouseY = e.clientY;
                        el.style.top = (el.offsetTop - offsetY) + 'px';
                        el.style.left = (el.offsetLeft - offsetX) + 'px';
                    };
                    document.onmouseup = () => { document.onmousemove = null; };
                }
            });
        });
        function updateClock() {
            document.getElementById('time').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
