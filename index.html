<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxoncord OS - Pro Edition</title>
    <style>
        :root { --bg-blur: blur(20px); --win-bg: rgba(30, 31, 34, 0.9); --taskbar-bg: rgba(0, 0, 0, 0.4); }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; height: 100vh; background: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?q=80&w=2070') center/cover; overflow: hidden; color: white; }
        
        /* Desktop Icons */
        #desktop { height: calc(100% - 60px); padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, 100px); grid-template-rows: repeat(auto-fill, 100px); gap: 20px; }
        .desktop-item { cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; border-radius: 8px; }
        .desktop-item:hover { background: rgba(255,255,255,0.1); }
        .desktop-item img { width: 50px; height: 50px; margin-bottom: 5px; }
        .desktop-item span { font-size: 12px; text-shadow: 1px 1px 3px black; }

        /* Window System */
        .window { position: absolute; background: var(--win-bg); border-radius: 12px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); z-index: 10; backdrop-filter: var(--bg-blur); }
        .win-header { padding: 10px 15px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; cursor: move; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .win-controls span { cursor: pointer; margin-left: 10px; font-weight: bold; opacity: 0.7; }
        .win-controls span:hover { opacity: 1; }
        .win-content { flex: 1; display: flex; overflow: hidden; }

        /* Yxoncord UI */
        #yxon-servers { width: 72px; background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; }
        #yxon-channels { width: 220px; background: #2b2d31; padding: 15px; }
        #yxon-chat { flex: 1; background: #313338; display: flex; flex-direction: column; }
        .srv-btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; color: white; background: #313338; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .srv-btn:hover, .srv-btn.active { border-radius: 15px; background: #5865f2; }
        .chan-item { padding: 8px 12px; border-radius: 5px; cursor: pointer; color: #949ba4; margin-bottom: 2px; }
        .chan-item:hover { background: #35373c; color: white; }
        .chan-item.active { background: #3f4147; color: white; }
        .chan-item::before { content: "# "; }
        #msg-flow { flex: 1; overflow-y: auto; padding: 20px; }
        .msg-input { background: #383a40; border: none; margin: 15px; padding: 12px; border-radius: 8px; color: white; outline: none; }

        /* Other App Styles */
        #term-body { background: #000; color: #0f0; font-family: monospace; padding: 10px; flex: 1; overflow-y: auto; }
        #notepad-text { width: 100%; height: 100%; background: #fff; color: #333; padding: 15px; border: none; outline: none; resize: none; font-size: 16px; }
        #market-list { padding: 15px; width: 100%; }

        /* Taskbar */
        #taskbar { position: fixed; bottom: 0; width: 100%; height: 50px; background: var(--taskbar-bg); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="desktop">
    <div class="desktop-item" onclick="openWin('win-yxon')"><img src="https://img.icons8.com/color/96/discord-new-logo.png"><span>Yxoncord</span></div>
    <div class="desktop-item" onclick="openWin('win-stocks')"><img src="https://img.icons8.com/color/96/stocks.png"><span>Market</span></div>
    <div class="desktop-item" onclick="openWin('win-term')"><img src="https://img.icons8.com/color/96/console.png"><span>Terminal</span></div>
    <div class="desktop-item" onclick="openWin('win-note')"><img src="https://img.icons8.com/color/96/notepad.png"><span>Notepad</span></div>
</div>

<div id="win-yxon" class="window" style="width: 900px; height: 600px; top: 50px; left: 150px;">
    <div class="win-header"><span>Yxoncord Pro</span> <div class="win-controls"><span onclick="closeWin('win-yxon')">✕</span></div></div>
    <div class="win-content">
        <div id="yxon-servers">
            <button class="srv-btn" onclick="addServer()" style="background:#23a559;">+</button>
            <button class="srv-btn" onclick="joinServer()" style="background:#4e5058;">🔑</button>
            <div id="srv-list"></div>
        </div>
        <div id="yxon-channels">
            <div style="font-size: 11px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between;">
                CHANNELS <span onclick="addChannel()" style="cursor:pointer; color:#23a559;">+</span>
            </div>
            <div id="chan-list"></div>
        </div>
        <div id="yxon-chat">
            <div id="msg-flow">Select a server and channel...</div>
            <input type="text" id="chat-in" class="msg-input" placeholder="Message..." disabled>
        </div>
    </div>
</div>

<div id="win-stocks" class="window" style="width: 300px; height: 400px; top: 100px; left: 400px;">
    <div class="win-header"><span>Market</span> <div class="win-controls"><span onclick="closeWin('win-stocks')">✕</span></div></div>
    <div class="win-content"><div id="market-list">BTC: $64,231 <br> ETH: $3,421 <br> YXON: $1.42</div></div>
</div>

<div id="win-term" class="window" style="width: 500px; height: 300px; top: 200px; left: 300px;">
    <div class="win-header"><span>Terminal</span> <div class="win-controls"><span onclick="closeWin('win-term')">✕</span></div></div>
    <div class="win-content"><div id="term-body">root@yxoncord:~# <input type="text" style="background:transparent; border:none; color:#0f0; outline:none; width:70%;"></div></div>
</div>

<div id="win-note" class="window" style="width: 400px; height: 450px; top: 150px; left: 200px;">
    <div class="win-header"><span>Notepad</span> <div class="win-controls"><span onclick="closeWin('win-note')">✕</span></div></div>
    <div class="win-content"><textarea id="notepad-text" placeholder="Start typing..."></textarea></div>
</div>

<div id="taskbar">
    <img src="https://img.icons8.com/color/48/discord-new-logo.png" onclick="openWin('win-yxon')" style="cursor:pointer; width:32px;">
    <img src="https://img.icons8.com/color/48/stocks.png" onclick="openWin('win-stocks')" style="cursor:pointer; width:32px;">
    <img src="https://img.icons8.com/color/48/console.png" onclick="openWin('win-term')" style="cursor:pointer; width:32px;">
    <img src="https://img.icons8.com/color/48/notepad.png" onclick="openWin('win-note')" style="cursor:pointer; width:32px;">
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    // --- FIREBASE CONFIG (Replace with your actual keys) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_ID.firebaseapp.com",
        databaseURL: "https://YOUR_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_ID",
        storageBucket: "YOUR_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = localStorage.getItem('user') || prompt("Username:") || "User" + Math.floor(Math.random()*99);
    localStorage.setItem('user', user);

    let curSrv = null;
    let curChan = null;

    // Window Management
    function openWin(id) { document.getElementById(id).style.display = 'flex'; }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    // Dragging Logic
    document.querySelectorAll('.win-header').forEach(h => {
        h.onmousedown = (e) => {
            let win = h.closest('.window');
            let ox = e.clientX - win.offsetLeft;
            let oy = e.clientY - win.offsetTop;
            document.onmousemove = (me) => {
                win.style.left = (me.clientX - ox) + 'px';
                win.style.top = (me.clientY - oy) + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    // --- YXONCORD LOGIC ---
    function addServer() {
        let name = prompt("Server Name:");
        if(!name) return;
        let id = 's' + Date.now();
        db.ref('yxon/servers/'+id).set({ name, owner: user });
        db.ref('yxon/channels/'+id).push({ name: 'general' });
        alert("Server created! ID: " + id);
    }

    function joinServer() {
        let id = prompt("Enter Server ID:");
        if(id) db.ref('yxon/servers/'+id).once('value', s => s.exists() ? loadServer(id) : alert("No server found"));
    }

    function addChannel() {
        if(!curSrv) return alert("Select a server!");
        let name = prompt("Channel Name:");
        if(name) db.ref('yxon/channels/'+curSrv).push({ name: name.toLowerCase() });
    }

    // Global Server Listener
    db.ref('yxon/servers').on('value', snap => {
        let ui = document.getElementById('srv-list');
        ui.innerHTML = '';
        snap.forEach(s => {
            let b = document.createElement('button');
            b.className = 'srv-btn' + (curSrv === s.key ? ' active' : '');
            b.innerText = s.val().name[0].toUpperCase();
            b.onclick = () => loadServer(s.key);
            ui.appendChild(b);
        });
    });

    function loadServer(id) {
        curSrv = id;
        db.ref('yxon/channels/'+id).on('value', snap => {
            let ui = document.getElementById('chan-list');
            ui.innerHTML = '';
            snap.forEach(c => {
                let d = document.createElement('div');
                d.className = 'chan-item' + (curChan === c.key ? ' active' : '');
                d.innerText = c.val().name;
                d.onclick = () => loadChannel(c.key, c.val().name);
                ui.appendChild(d);
            });
        });
    }

    function loadChannel(id, name) {
        curChan = id;
        document.getElementById('chat-in').disabled = false;
        document.getElementById('chat-in').placeholder = "Message #" + name;
        
        let flow = document.getElementById('msg-flow');
        db.ref('yxon/msgs/'+id).off(); // Prevent duplicate listeners
        db.ref('yxon/msgs/'+id).on('value', snap => {
            flow.innerHTML = '';
            snap.forEach(m => {
                let msg = m.val();
                let div = document.createElement('div');
                div.style.padding = "5px 0";
                div.innerHTML = `<b style="color:#5865f2">${msg.u}:</b> ${msg.t}`;
                flow.appendChild(div);
            });
            flow.scrollTop = flow.scrollHeight;
        });
    }

    document.getElementById('chat-in').onkeypress = (e) => {
        if(e.key === 'Enter' && e.target.value) {
            db.ref('yxon/msgs/'+curChan).push({ u: user, t: e.target.value });
            e.target.value = '';
        }
    };
</script>

</body>
</html>
