<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windows 11 Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background: url('https://i.imgur.com/vH9vX7v.jpg') center/cover no-repeat fixed;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .win-glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .taskbar-icon {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .taskbar-icon:active { transform: scale(0.8); }
    </style>
</head>
<body x-data="{ 
    startMenu: false, 
    browserOpen: false, 
    settingsOpen: false,
    zPriority: 10
}">

    <!-- Desktop Icons -->
    <div class="p-6 grid grid-cols-1 gap-8 w-24">
        <div @dblclick="browserOpen = true" @click="if(window.innerWidth < 1024) browserOpen = true" class="flex flex-col items-center gap-1 group cursor-pointer">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" class="w-12 h-12 drop-shadow-md">
            <span class="text-white text-xs font-medium drop-shadow-md">Edge</span>
        </div>
    </div>

    <!-- Edge Browser Window -->
    <div x-show="browserOpen" 
         x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         class="absolute inset-4 md:inset-10 win-glass rounded-xl shadow-2xl flex flex-col z-10 overflow-hidden border border-white/40">
        
        <div class="h-10 flex items-center justify-between px-4 bg-white/30">
            <div class="flex items-center gap-2">
                <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" class="w-4 h-4">
                <span class="text-xs font-semibold text-gray-700">Microsoft Edge</span>
            </div>
            <div class="flex gap-2">
                <button @click="browserOpen = false" class="w-8 h-8 flex items-center justify-center hover:bg-red-500 hover:text-white rounded-lg transition-colors text-gray-600">✕</button>
            </div>
        </div>
        <div class="flex-grow bg-white">
            <iframe src="https://www.bing.com" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <!-- Start Menu -->
    <div x-show="startMenu" 
         x-cloak
         @click.outside="startMenu = false"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-20"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-end="opacity-0 translate-y-20"
         class="absolute bottom-16 left-1/2 -translate-x-1/2 w-[95%] max-w-[540px] h-[600px] win-glass rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] z-50 p-8">
        
        <div class="flex justify-between items-center mb-6">
            <span class="font-bold text-sm text-gray-800">Pinned</span>
            <button class="text-xs bg-white/50 px-2 py-1 rounded shadow-sm border border-black/5 font-medium">All apps ></button>
        </div>

        <div class="grid grid-cols-6 gap-4">
            <template x-for="i in 12">
                <div class="flex flex-col items-center gap-2 p-2 hover:bg-white/40 rounded-lg cursor-pointer transition-colors">
                    <div class="w-10 h-10 bg-blue-500 rounded-lg shadow-sm"></div>
                    <span class="text-[10px] text-gray-700">App</span>
                </div>
            </template>
        </div>

        <div class="absolute bottom-0 left-0 w-full h-16 bg-black/5 border-t border-white/20 rounded-b-2xl flex items-center justify-between px-10">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gray-400"></div>
                <span class="text-xs font-semibold text-gray-700">User</span>
            </div>
            <img src="https://cdn-icons-png.flaticon.com/512/6711/6711467.png" class="w-5 h-5 opacity-70">
        </div>
    </div>

    <!-- Taskbar -->
    <div class="absolute bottom-0 w-full h-12 win-glass border-t border-white/30 flex items-center justify-center z-[100] px-4">
        <div class="flex items-center gap-1">
            <!-- Start Toggle -->
            <button @click="startMenu = !startMenu" class="p-2 hover:bg-white/50 rounded-md transition-all taskbar-icon">
                <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" class="w-6 h-6">
            </button>
            
            <!-- Search -->
            <button class="p-2 hover:bg-white/50 rounded-md transition-all taskbar-icon hidden sm:block">
                <img src="https://cdn-icons-png.flaticon.com/512/54/54481.png" class="w-5 h-5 opacity-70">
            </button>

            <!-- Edge Icon -->
            <button @click="browserOpen = !browserOpen" class="p-2 hover:bg-white/50 rounded-md transition-all taskbar-icon relative">
                <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" class="w-6 h-6">
                <div x-show="browserOpen" class="absolute bottom-0 left-1/2 -translate-x-1/2 w-1.5 h-1 bg-blue-600 rounded-full"></div>
            </button>
        </div>

        <!-- System Tray (iPad friendly) -->
        <div class="absolute right-4 flex items-center gap-4 text-[11px] font-medium text-gray-800">
            <div class="flex flex-col items-end leading-tight">
                <span id="clock">12:00 PM</span>
                <span id="date">4/6/2026</span>
            </div>
        </div>
    </div>

    <script>
        // Update Clock
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
