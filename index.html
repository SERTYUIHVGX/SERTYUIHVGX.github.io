<!DOCTYPE html>

    <style>
        /* DESKTOP STYLING */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Tahoma", sans-serif; }

        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 10px;
        }

        .icon {
            width: 90px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .icon img { width: 45px; height: 45px; margin-bottom: 4px; }
        .icon:active { background-color: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; }

        /* WINDOW STYLING */
        .window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 80%;
            max-width: 900px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0;
            display: none; 
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
            flex-direction: column;
        }

        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white;
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            height: 32px;
        }

        .close-btn {
            background: linear-gradient(to bottom, #f2453e 0%, #c72c2c 100%);
            color: white;
            border: 1px solid white;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            cursor: pointer;
        }

        .window-body {
            flex-grow: 1;
            margin: 2px;
            background: white;
            border: 1px solid #7f9db9;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* TASKBAR */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .system-tray {
            color: white;
            background: linear-gradient(to bottom, #0997ff 0%, #0053ee 100%);
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 12px;
            border-left: 1px solid #10b5fc;
        }
    </style>
</head>

    <script>
        function toggleWindow(id) {
            const win = document.getElementById(id);
            // Hide all windows first to bring the selected one to front
            if (win.style.display === 'flex') {
                win.style.display = 'none';
            } else {
                win.style.display = 'flex';
                win.style.zIndex = parseInt(new Date().getTime() / 1000); // Bring to front
            }
        }

        function updateTrayClock() {
            const now = new Date();
            document.getElementById('tray-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateTrayClock, 1000);
        updateTrayClock();
    </script>
