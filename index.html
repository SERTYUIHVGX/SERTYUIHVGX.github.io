<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS - Fully Functional</title>
    <style>
        /* CORE DESKTOP STYLING */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Tahoma", "Segoe UI", sans-serif; background: #000; }

        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: calc(100vh - 35px);
            width: 100vw;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px;
        }

        .icon {
            width: 80px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            cursor: pointer;
            border: 1px solid transparent;
            font-size: 11px;
            text-align: center;
        }
        .icon:hover { background-color: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 3px; }
        .icon img { width: 40px; height: 40px; margin-bottom: 5px; }

        /* WINDOW LOGIC */
        .window {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 70%;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0;
            display: none;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            height: 32px;
            cursor: move;
        }

        .close-btn {
            background: #c72c2c;
            color: white;
            border: 1px solid white;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 12px;
        }
        .close-btn:hover { background: #ff0000; }

        .window-body { flex-grow: 1; background: white; margin: 2px; position: relative; border: 1px solid #7f9db9; }
        iframe { width: 100%; height: 100%; border: none; }

        /* TASKBAR */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .system-tray {
            color: white;
            background: linear-gradient(to bottom, #0997ff 0%, #0053ee 100%);
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 12px;
            border-left: 1px solid #10b5fc;
        }
    </style>
</head>
<body>

<div class="desktop">
    <div class="icon" onclick="openWindow('terminal-win')">
        <img src="https://win98icons.alexmeub.com/icons/png/console_prompt-0.png" alt="Terminal">
        <span>Yxon6 OS</span>
    </div>

    <div class="icon" onclick="openWindow('bing-win')">
        <img src="https://www.bing.com/favicon.ico" alt="Bing">
        <span>Bing</span>
    </div>

    <!-- TERMINAL WINDOW -->
    <div id="terminal-win" class="window">
        <div class="window-header">
            <span>Terminal - Yxon6 OS</span>
            <div class="close-btn" onclick="closeWindow('terminal-win')">X</div>
        </div>
        <div class="window-body" style="background: black;">
            <iframe id="term-frame"></iframe>
        </div>
    </div>

    <!-- BING WINDOW -->
    <div id="bing-win" class="window">
        <div class="window-header">
            <span>Bing Search</span>
            <div class="close-btn" onclick="closeWindow('bing-win')">X</div>
        </div>
        <div class="window-body">
            <iframe id="bing-frame"></iframe>
        </div>
    </div>
</div>

<div class="taskbar">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3e/Windows_XP_Start_button.png/150px-Windows_XP_Start_button.png" style="height:100%; cursor: pointer;">
    <div class="system-tray">
        <div id="clock" style="font-weight: bold;">00:00</div>
    </div>
</div>
