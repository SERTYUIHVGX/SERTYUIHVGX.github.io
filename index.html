<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Pro Terminal OS</title>
    <style>
        :root { --bg-blur: blur(20px); --win-bg: rgba(255, 255, 255, 0.9); --taskbar-bg: rgba(243, 243, 243, 0.8); }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop') center/cover; }

        /* Window System */
        .window {
            position: absolute; width: 350px; min-height: 200px;
            background: var(--win-bg); border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none; flex-direction: column; z-index: 10;
            overflow: hidden; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .win-header { 
            padding: 12px; background: rgba(0,0,0,0.05); 
            display: flex; justify-content: space-between; 
            cursor: move; font-weight: 600; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .win-content { flex: 1; padding: 15px; overflow-y: auto; max-height: 400px; }
        .close-btn { color: #ff5f56; cursor: pointer; font-size: 18px; }

        /* Taskbar */
        #taskbar {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            height: 65px; padding: 0 15px; background: var(--taskbar-bg);
            backdrop-filter: var(--bg-blur); border-radius: 20px;
            display: flex; align-items: center; gap: 10px; z-index: 9999;
            border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .task-icon { width: 45px; height: 45px; cursor: pointer; transition: 0.2s; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .task-icon:active { transform: scale(0.9); }
        .task-icon img { width: 35px; height: 35px; }

        /* Stock App Styles */
        .stock-card { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .chart { width: 100%; height: 40px; stroke-width: 2; fill: none; margin-top: 5px; }
        .controls { display: flex; gap: 5px; margin-top: 8px; }
        button { border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-buy { background: #4caf50; color: white; }
        .btn-sell { background: #f44336; color: white; }
        #portfolio { background: #333; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; }

        /* Terminal & Chat */
        #term-body { background: #121212; color: #0f0; font-family: monospace; height: 250px; }
        .chat-msg { margin-bottom: 8px; font-size: 0.9em; }
        .chat-user { font-weight: bold; color: #0078d4; }
    </style>
</head>
<body>

<div id="taskbar">
    <div class="task-icon" onclick="toggleWin('win-term')"><img src="https://img.icons8.com/color/48/console.png"></div>
    <div class="task-icon" onclick="toggleWin('win-stocks')"><img src="https://img.icons8.com/color/48/stocks.png"></div>
    <div class="task-icon" onclick="toggleWin('win-games')"><img src="https://img.icons8.com/color/48/controller-icon.png"></div>
    <div class="task-icon" onclick="toggleWin('win-notes')"><img src="https://img.icons8.com/color/48/notepad.png"></div>
    <div class="task-icon" onclick="toggleWin('win-chat')"><img src="https://img.icons8.com/color/48/chat.png"></div>
</div>

<div id="win-stocks" class="window" style="top:50px; left:50px; width:320px">
    <div class="win-header"><span>Market Terminal</span> <span class="close-btn" onclick="toggleWin('win-stocks')">●</span></div>
    <div class="win-content">
        <div id="portfolio">Balance: $<span id="balance">1000.00</span><br><small id="holdings">Holdings: None</small></div>
        <div id="market-list"></div>
    </div>
</div>

<div id="win-games" class="window" style="top:80px; left:400px;">
    <div class="win-header"><span>Game Hub</span> <span class="close-btn" onclick="toggleWin('win-games')">●</span></div>
    <div class="win-content">
        <h3>Card Classics</h3>
        <button onclick="window.open('https://worldofsolitaire.com/?deck=tripeaks', '_blank')" style="width:100%; margin-bottom:10px; background:#673ab7; color:white;">Play Tri-Peaks</button>
        <button onclick="window.open('https://worldofsolitaire.com/', '_blank')" style="width:100%; background:#03a9f4; color:white;">Classic Solitaire</button>
    </div>
</div>

<div id="win-notes" class="window" style="top:200px; left:150px;">
    <div class="win-header"><span>Notepad</span> <span class="close-btn" onclick="toggleWin('win-notes')">●</span></div>
    <div class="win-content" style="padding:0">
        <textarea style="width:100%; height:200px; border:none; padding:10px; outline:none; resize:none;" placeholder="Write something..."></textarea>
    </div>
</div>

<div id="win-chat" class="window" style="top:100px; left:800px;">
    <div class="win-header"><span>Global Chat</span> <span class="close-btn" onclick="toggleWin('win-chat')">●</span></div>
    <div class="win-content" id="chat-box" style="height:250px;">
        <div class="chat-msg"><span class="chat-user">System:</span> Connecting to global server...</div>
    </div>
    <div style="padding:10px; display:flex; border-top:1px solid #eee;">
        <input id="chat-in" type="text" placeholder="Message..." style="flex:1; border:1px solid #ddd; border-radius:5px; padding:5px;">
    </div>
</div>

<div id="win-term" class="window" style="top:300px; left:450px; width:450px">
    <div class="win-header"><span>Terminal</span> <span class="close-btn" onclick="toggleWin('win-term')">●</span></div>
    <div class="win-content" id="term-body">
        <div>Root@Desktop:~# type 'help'</div>
        <div id="term-out"></div>
        <input id="term-in" type="text" style="background:transparent; border:none; color:#0f0; outline:none; width:100%;">
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
// --- FIREBASE CONFIG ---
// Replace this with your actual config from Firebase Console
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_ID.firebaseapp.com",
    databaseURL: "https://YOUR_ID-default-rtdb.firebaseio.com",
    projectId: "YOUR_ID",
    storageBucket: "YOUR_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const messagesRef = db.ref('chat_messages');

// --- Window Logic ---
let activeWin = null, offsetX, offsetY;
document.querySelectorAll('.win-header').forEach(header => {
    header.addEventListener('mousedown', startDrag);
    header.addEventListener('touchstart', startDrag, {passive: false});
});
function startDrag(e) {
    activeWin = e.target.closest('.window');
    const evt = e.type === 'touchstart' ? e.touches[0] : e;
    offsetX = evt.clientX - activeWin.offsetLeft;
    offsetY = evt.clientY - activeWin.offsetTop;
    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag, {passive: false});
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);
}
function drag(e) {
    if (!activeWin) return;
    e.preventDefault();
    const evt = e.type === 'touchmove' ? e.touches[0] : e;
    activeWin.style.left = (evt.clientX - offsetX) + 'px';
    activeWin.style.top = (evt.clientY - offsetY) + 'px';
}
function stopDrag() { activeWin = null; }
function toggleWin(id) {
    const w = document.getElementById(id);
    w.style.display = w.style.display === 'flex' ? 'none' : 'flex';
}

// --- Stock System ---
let balance = 1000;
let portfolio = {};
const stocks = [
    { id: 'brew', name: 'BREW', price: 50, history: [50, 52, 48, 50] },
    { id: 'tech', name: 'GLXY', price: 120, history: [120, 125, 118, 120] },
    { id: 'meme', name: 'DOGE', price: 0.50, history: [0.4, 0.6, 0.5, 0.5] }
];

function updateMarket() {
    const list = document.getElementById('market-list');
    if(!list) return;
    list.innerHTML = '';
    stocks.forEach(s => {
        if(Math.random() > 0.4) { 
            const change = (Math.random() - 0.5) * (s.price * 0.1);
            s.price = Math.max(0.01, s.price + change);
        }
        s.history.push(s.price);
        if(s.history.length > 20) s.history.shift();
        const points = s.history.map((p, i) => `${i*15},${40 - (p/Math.max(...s.history)*30)}`).join(' ');
        const color = s.price >= s.history[s.history.length-2] ? '#4caf50' : '#f44336';
        list.innerHTML += `
            <div class="stock-card">
                <div style="display:flex; justify-content:space-between">
                    <b>${s.name}</b> <span>$${s.price.toFixed(2)}</span>
                </div>
                <svg class="chart"><polyline points="${points}" stroke="${color}"/></svg>
                <div class="controls">
                    <button class="btn-buy" onclick="buyStock('${s.id}')">Buy</button>
                    <button class="btn-sell" onclick="sellStock('${s.id}')">Sell</button>
                    <small>${portfolio[s.id] || 0} Owned</small>
                </div>
            </div>`;
    });
    document.getElementById('balance').innerText = balance.toFixed(2);
}
function buyStock(id) {
    const s = stocks.find(x => x.id === id);
    if(balance >= s.price) { balance -= s.price; portfolio[id] = (portfolio[id] || 0) + 1; updateMarket(); }
}
function sellStock(id) {
    const s = stocks.find(x => x.id === id);
    if(portfolio[id] > 0) { balance += s.price; portfolio[id] -= 1; updateMarket(); }
}
setInterval(updateMarket, 3000);
updateMarket();

// --- REAL-TIME CHAT (Multiplayer) ---
const chatBox = document.getElementById('chat-box');
const chatIn = document.getElementById('chat-in');

// Create a persistent username for this session
let myName = "User_" + Math.floor(Math.random()*9000 + 1000);

chatIn.addEventListener('keypress', (e) => {
    if(e.key === 'Enter' && chatIn.value.trim() !== '') {
        // Send message to Firebase
        messagesRef.push({
            user: myName,
            text: chatIn.value,
            time: Date.now()
        });
        chatIn.value = '';
    }
});

// Sync from Firebase
messagesRef.limitToLast(30).on('child_added', (snapshot) => {
    const data = snapshot.val();
    const isMe = data.user === myName;
    chatBox.innerHTML += `
        <div class="chat-msg">
            <span class="chat-user" style="color: ${isMe ? '#4caf50' : '#0078d4'}">${data.user}:</span> ${data.text}
        </div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
});
</script>
</body>
</html>
