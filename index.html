<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS - Final Edition</title>
    <style>
        /* CORE DESKTOP SYSTEM */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Tahoma", sans-serif; background: #000; }

        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            position: relative;
            padding: 20px;
        }

        .icon {
            width: 90px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
        }
        .icon img { width: 45px; height: 45px; margin-bottom: 5px; }
        .icon:active { background: rgba(255,255,255,0.3); border-radius: 4px; }

        /* WINDOW FRAMEWORK */
        .window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 85%;
            max-width: 1100px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0;
            display: none;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
        }

        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
        }

        .close-btn {
            background: linear-gradient(to bottom, #f2453e 0%, #c72c2c 100%);
            color: white;
            border: 1px solid white;
            width: 22px;
            height: 22px;
            border-radius: 3px;
            text-align: center;
            line-height: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        /* EXPLORER BROWSER UI */
        .browser-controls {
            background: #f0f0f0;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #999;
        }

        .nav-btn {
            padding: 4px 10px;
            background: linear-gradient(to bottom, #fff, #e0e0e0);
            border: 1px solid #7f9db9;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .address-bar {
            flex-grow: 1;
            padding: 6px 12px;
            border: 1px solid #7f9db9;
            border-radius: 2px;
            font-size: 13px;
            outline: none;
            background: white;
        }
