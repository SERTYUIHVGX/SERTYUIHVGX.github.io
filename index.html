<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS - XP Edition</title>
    <style>
        /* CSS STYLES */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: "Tahoma", "Segoe UI", sans-serif;
        }

        /* Desktop Area */
        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Icons */
        .icon {
            width: 90px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            padding: 10px;
            margin: 10px;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
        }

        .icon img {
            width: 45px;
            height: 45px;
            margin-bottom: 4px;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5));
        }

        .icon:active {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        /* The Window */
        .window {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0;
            display: none; 
            box-shadow: 10px 10px 20px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            height: 30px;
        }

        .close-btn {
            background: linear-gradient(to bottom, #f2453e 0%, #c72c2c 100%);
            color: white;
            border: 1px solid white;
            font-weight: bold;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.4);
        }

        .window-body {
            padding: 15px;
            height: 220px;
            color: black;
            background: white;
            margin: 2px;
            border: 1px solid #7f9db9;
            overflow-y: auto;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .start-btn {
            height: 100%;
            cursor: pointer;
        }

        .system-tray {
            color: white;
            background: linear-gradient(to bottom, #0997ff 0%, #0053ee 100%);
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 12px;
            border-left: 1px solid #10b5fc;
            box-shadow: inset 1px 0px 2px rgba(0,0,0,0.2);
        }

        /* Start Menu */
        .start-menu {
            position: fixed;
            bottom: 35px;
            left: 0;
            width: 300px;
            background: white;
            border: 2px solid #245edb;
            border-radius: 5px 5px 0 0;
            display: none;
            z-index: 99;
            box-shadow: 2px -2px 15px rgba(0,0,0,0.3);
        }

        .start-menu-header {
            background: linear-gradient(to bottom, #1d52d1 0%, #4689f2 100%);
            color: white;
            padding: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="desktop" onclick="closeStart()">
        <!-- Renamed Icon and Updated to Classic OS Style -->
        <div class="icon" onclick="event.stopPropagation(); toggleWindow('pc-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/msie2-2.png" alt="Yxon6 OS">
            <span>Yxon6 OS</span>
        </div>

        <div id="pc-window" class="window">
            <div class="window-header">
                <span>Yxon6 OS</span>
                <div class="close-btn" onclick="toggleWindow('pc-window')">X</div>
            </div>
            <div class="window-body">
                <h3 style="margin-top:0;">System Properties</h3>
                <p><b>OS Name:</b> Yxon6 OS Professional</p>
                <p><b>Version:</b> 2026.1 (iPad Build)</p>
                <p><b>Status:</b> System is running smoothly.</p>
                <hr>
                <p style="font-size: 12px; color: #666;">This is a purely HTML-based clone designed for touch interaction.</p>
            </div>
        </div>
    </div>

    <div id="start-menu" class="start-menu">
        <div class="start-menu-header">
            <img src="https://win98icons.alexmeub.com/icons/png/user_world-0.png" width="32">
            Yxon6 User
        </div>
        <div style="padding: 10px; color: #333;">
            <p>📁 My Documents</p>
            <p>⚙️ Control Panel</p>
            <p>🔍 Search</p>
            <hr>
            <p style="color: #d61a1a; font-weight: bold;">Log Off | Shut Down</p>
        </div>
    </div>

    <div class="taskbar">
        <img class="start-btn" src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3e/Windows_XP_Start_button.png/150px-Windows_XP_Start_button.png" onclick="event.stopPropagation(); toggleStart()">
        
        <div class="system-tray">
            <span id="clock">--:--</span>
        </div>
    </div>

    <script>
        // TOGGLE LOGIC
        function toggleWindow(id) {
            const win = document.getElementById(id);
            if (win.style.display === 'block') {
                win.style.display = 'none';
            } else {
                win.style.display = 'block';
                closeStart(); // Close start menu when opening a window
            }
        }

        function toggleStart() {
            const menu = document.getElementById('start-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function closeStart() {
            document.getElementById('start-menu').style.display = 'none';
        }

        // CLOCK LOGIC
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('clock').innerText = hours + ":" + minutes + " " + ampm;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
