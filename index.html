<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad-OS Terminal Desktop</title>
    <style>
        :root {
            --bg-blur: blur(20px);
            --win-bg: rgba(255, 255, 255, 0.7);
            --taskbar-bg: rgba(243, 243, 243, 0.85);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1974&auto=format&fit=crop') center/cover;
        }

        /* Desktop Area */
        #desktop {
            height: calc(100vh - 60px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Taskbar */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--taskbar-bg);
            backdrop-filter: var(--bg-blur);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; border-top: 1px solid rgba(0,0,0,0.1);
        }

        .task-icon {
            width: 40px; height: 40px; margin: 0 8px;
            cursor: pointer; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
        }
        .task-icon:hover { transform: translateY(-5px); background: rgba(0,0,0,0.05); }
        .task-icon img { width: 30px; height: 30px; }

        /* Window System */
        .window {
            position: absolute; width: 400px; height: 300px;
            background: white; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none; flex-direction: column;
            overflow: hidden; resize: both; min-width: 300px;
        }

        .win-header {
            padding: 10px; background: #eee; display: flex; 
            justify-content: space-between; cursor: move;
        }

        .close-btn { color: red; cursor: pointer; font-weight: bold; padding: 0 5px; }

        .win-content { flex: 1; padding: 15px; overflow-y: auto; }

        /* Apps Specific Styles */
        #terminal-app { background: #0c0c0c; color: #00ff00; font-family: monospace; }
        .stock-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
        .price-up { color: green; }
        .price-down { color: red; }

        /* iPad Optimizations */
        @media (max-width: 1024px) {
            .window { width: 90%; left: 5% !important; top: 10% !important; }
            .task-icon { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

<div id="desktop">
    <div style="width: 300px; background: var(--win-bg); backdrop-filter: var(--bg-blur); padding: 15px; border-radius: 15px;">
        <h3 style="margin-top:0">☕ Morning Brew News</h3>
        <div id="news-feed" style="font-size: 0.9em;">Loading brew...</div>
        <button onclick="fetchNews()" style="margin-top:10px; cursor:pointer;">Refresh News</button>
    </div>
</div>

<div id="win-stocks" class="window" style="top: 100px; left: 400px;">
    <div class="win-header"><span>📈 Stock Market</span> <span class="close-btn" onclick="toggleWin('win-stocks')">X</span></div>
    <div class="win-content" id="stock-list"></div>
</div>

<div id="win-terminal" class="window" style="top: 150px; left: 100px;">
    <div class="win-header"><span>cmd.exe</span> <span class="close-btn" onclick="toggleWin('win-terminal')">X</span></div>
    <div class="win-content" id="terminal-app">
        <div>Microsoft Windows [Version 11.0.22621]</div>
        <div>(c) Microsoft Corporation. All rights reserved.</div><br>
        <div id="term-out">C:\Users\Admin> type 'help' to start...</div>
        <div style="display:flex">C:\Users\Admin>&nbsp;<input id="term-in" type="text" autofocus style="background:transparent; border:none; color:#00ff00; outline:none; width:100%; font-family:monospace;"></div>
    </div>
</div>

<div id="taskbar">
    <div class="task-icon" title="Start"><img src="https://img.icons8.com/color/48/windows-11.png"></div>
    <div class="task-icon" onclick="toggleWin('win-terminal')"><img src="https://img.icons8.com/color/48/console.png"></div>
    <div class="task-icon" onclick="toggleWin('win-stocks')"><img src="https://img.icons8.com/color/48/stocks.png"></div>
</div>

<script>
    // --- Window Logic ---
    function toggleWin(id) {
        const win = document.getElementById(id);
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }

    // --- Terminal Logic ---
    const termIn = document.getElementById('term-in');
    const termOut = document.getElementById('term-out');

    termIn.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const cmd = termIn.value.toLowerCase();
            let response = `<div>C:\\Users\\Admin> ${cmd}</div>`;
            
            if (cmd === 'help') response += "<div>Available: help, news, cls, date</div>";
            else if (cmd === 'cls') { termOut.innerHTML = ''; termIn.value = ''; return; }
            else if (cmd === 'news') response += "<div>Opening News feed... Check your desktop.</div>";
            else if (cmd === 'date') response += `<div>${new Date().toLocaleString()}</div>`;
            else response += `<div>'${cmd}' is not recognized as an internal or external command.</div>`;
            
            termOut.innerHTML += response;
            termIn.value = '';
            termOut.parentElement.scrollTop = termOut.parentElement.scrollHeight;
        }
    });

    // --- Volatile Stocks Simulation ---
    const stocks = [
        { name: 'AAPL', price: 150.25 },
        { name: 'TSLA', price: 680.50 },
        { name: 'BTC', price: 42000.00 },
        { name: 'BREW', price: 25.00 }
    ];

    function updateStocks() {
        const list = document.getElementById('stock-list');
        list.innerHTML = '';
        stocks.forEach(s => {
            const change = (Math.random() - 0.5) * 10; // Random drop or raise
            const oldPrice = s.price;
            s.price = Math.max(1, s.price + change); // Don't let stock hit 0
            
            const colorClass = s.price >= oldPrice ? 'price-up' : 'price-down';
            const arrow = s.price >= oldPrice ? '▲' : '▼';

            list.innerHTML += `
                <div class="stock-item">
                    <span><b>${s.name}</b></span>
                    <span class="${colorClass}">${arrow} $${s.price.toFixed(2)}</span>
                </div>
            `;
        });
    }
    setInterval(updateStocks, 2000);
    updateStocks();

    // --- News Logic (Morning Brew Feel) ---
    async function fetchNews() {
        const feed = document.getElementById('news-feed');
        feed.innerHTML = "Brewing fresh news...";
        
        // Using a public RSS to JSON proxy to get real tech/business news
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.theverge.com/rss/index.xml');
            const data = await res.json();
            feed.innerHTML = data.items.slice(0, 3).map(item => `
                <div style="margin-bottom:10px;">
                    <a href="${item.link}" target="_blank" style="text-decoration:none; color:#333; font-weight:bold;">• ${item.title}</a>
                </div>
            `).join('');
        } catch (e) {
            feed.innerHTML = "Could't fetch news. Are you offline?";
        }
    }
    fetchNews();
</script>

</body>
</html>
