<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxoncord Pro - Multi-Server</title>
    <style>
        :root { --bg-blur: blur(25px); --win-bg: rgba(30, 31, 34, 0.95); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; height: 100vh; background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover; overflow: hidden; }
        
        #desktop { height: calc(100% - 60px); padding: 20px; display: flex; flex-direction: column; gap: 20px; align-items: flex-start; }
        .desktop-item { cursor: pointer; text-align: center; width: 80px; }
        .desktop-item img { width: 50px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .desktop-item span { color: white; display: block; font-size: 12px; margin-top: 5px; text-shadow: 1px 1px 2px black; }

        .window { position: absolute; width: 800px; height: 500px; background: var(--win-bg); border-radius: 12px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        .win-header { padding: 10px 15px; background: rgba(0,0,0,0.2); color: #fff; display: flex; justify-content: space-between; cursor: move; }
        
        .win-content { flex: 1; display: flex; }
        #yxon-servers { width: 72px; background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; border-right: 1px solid #111; }
        #yxon-channels { width: 200px; background: #2b2d31; color: #949ba4; padding: 20px 10px; }
        #yxon-chat { flex: 1; background: #313338; display: flex; flex-direction: column; }

        .srv-btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 18px; transition: 0.2s; background: #313338; margin-bottom: 5px; }
        .srv-btn:hover { border-radius: 30%; background: #5865f2; }
        .srv-btn.active { border-radius: 30%; background: #5865f2; }
        .add-btn { background: #23a559; }
        .join-btn { background: #4e5058; }

        .chan-item { padding: 8px; border-radius: 4px; cursor: pointer; margin-bottom: 2px; }
        .chan-item:hover { background: #35373c; color: #dbdee1; }
        .chan-item.active { background: #3f4147; color: white; }
        .chan-item::before { content: "# "; color: #6d6f78; }

        #yxon-messages { flex: 1; overflow-y: auto; padding: 20px; color: #dbdee1; }
        .msg-input { background: #383a40; border: none; margin: 20px; padding: 12px; border-radius: 8px; color: white; outline: none; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="desktop-item" onclick="toggleWin('win-yxon')">
        <img src="https://img.icons8.com/color/96/discord-new-logo.png">
        <span>Yxoncord</span>
    </div>
</div>

<div id="win-yxon" class="window">
    <div class="win-header">
        <span id="server-title">Yxoncord Pro</span>
        <span onclick="toggleWin('win-yxon')" style="cursor:pointer">✕</span>
    </div>
    <div class="win-content">
        <div id="yxon-servers">
            <button class="srv-btn add-btn" onclick="createServer()" title="Create Server">+</button>
            <button class="srv-btn join-btn" onclick="joinServer()" title="Join Server">🔑</button>
            <hr style="width:30px; border: 1px solid #35363c;">
            <div id="srv-list-ui"></div>
        </div>
        <div id="yxon-channels">
            <div style="font-size:12px; font-weight:bold; display:flex; justify-content:space-between; margin-bottom:15px; color:white;">
                CHANNELS <span onclick="createChannel()" style="cursor:pointer; color:#23a559;">+</span>
            </div>
            <div id="chan-list-ui"></div>
        </div>
        <div id="yxon-chat">
            <div id="yxon-messages">Select a channel to start chatting</div>
            <input type="text" id="yxon-input" class="msg-input" placeholder="Message..." disabled>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = localStorage.getItem('yxon_user') || prompt("Username:") || "Guest";
    localStorage.setItem('yxon_user', myName);

    let currentSrv = null;
    let currentChan = null;

    // --- WINDOW CONTROLS ---
    function toggleWin(id) {
        const w = document.getElementById(id);
        w.style.display = (w.style.display === 'flex') ? 'none' : 'flex';
        if(w.style.display === 'flex') {
            w.style.top = "50px"; w.style.left = "100px";
        }
    }

    // --- CORE LOGIC ---

    function createServer() {
        const name = prompt("Server Name:");
        if(!name) return;
        const srvId = 'srv_' + Math.random().toString(36).substr(2, 9);
        db.ref('yxon/servers/' + srvId).set({ name: name, owner: myName });
        // Create a default general channel
        db.ref('yxon/channels/' + srvId).push({ name: 'general' });
        alert("Server Created! ID: " + srvId + "\nShare this ID with friends to join.");
    }

    function joinServer() {
        const id = prompt("Enter Server ID:");
        if(!id) return;
        db.ref('yxon/servers/' + id).once('value', snap => {
            if(snap.exists()) {
                switchServer(id);
            } else {
                alert("Server not found.");
            }
        });
    }

    function createChannel() {
        if(!currentSrv) return alert("Select a server first!");
        const name = prompt("Channel Name:");
        if(name) {
            db.ref('yxon/channels/' + currentSrv).push({ name: name.toLowerCase().replace(/\s+/g, '-') });
        }
    }

    // Listen for all servers (Global Discovery for this demo)
    db.ref('yxon/servers').on('value', snap => {
        const list = document.getElementById('srv-list-ui');
        list.innerHTML = '';
        const data = snap.val() || {};
        for(let id in data) {
            const btn = document.createElement('button');
            btn.className = 'srv-btn' + (currentSrv === id ? ' active' : '');
            btn.innerText = data[id].name[0].toUpperCase();
            btn.onclick = () => switchServer(id);
            list.appendChild(btn);
        }
    });

    function switchServer(srvId) {
        currentSrv = srvId;
        db.ref('yxon/servers/' + srvId).once('value', s => {
            document.getElementById('server-title').innerText = "Yxoncord Pro - " + s.val().name;
        });

        // Listen for channels in THIS server
        db.ref('yxon/channels/' + srvId).on('value', snap => {
            const list = document.getElementById('chan-list-ui');
            list.innerHTML = '';
            const data = snap.val() || {};
            for(let cId in data) {
                const div = document.createElement('div');
                div.className = 'chan-item' + (currentChan === cId ? ' active' : '');
                div.innerText = data[cId].name;
                div.onclick = () => switchChannel(cId, data[cId].name);
                list.appendChild(div);
            }
        });
    }

    function switchChannel(chanId, name) {
        currentChan = chanId;
        const input = document.getElementById('yxon-input');
        input.disabled = false;
        input.placeholder = `Message #${name}`;
        
        const msgDiv = document.getElementById('yxon-messages');
        msgDiv.innerHTML = 'Loading messages...';

        // Listen for messages in THIS channel
        db.ref('yxon/messages/' + chanId).off();
        db.ref('yxon/messages/' + chanId).limitToLast(50).on('value', snap => {
            msgDiv.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                div.style.marginBottom = "10px";
                div.innerHTML = `<b style="color:#5865f2">${m.user}</b> <span style="font-size:10px; color:gray;">${new Date(m.time).toLocaleTimeString()}</span><br>${m.text}`;
                msgDiv.appendChild(div);
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    }

    document.getElementById('yxon-input').onkeypress = (e) => {
        if(e.key === 'Enter' && e.target.value && currentChan) {
            db.ref('yxon/messages/' + currentChan).push({
                user: myName,
                text: e.target.value,
                time: Date.now()
            });
            e.target.value = '';
        }
    };
</script>

</body>
</html>
