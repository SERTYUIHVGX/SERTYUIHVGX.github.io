<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yxoncord OS Pro - Secure Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-blur: blur(25px); --win-bg: rgba(30, 31, 34, 0.92); --taskbar-bg: rgba(243, 243, 243, 0.2); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; height: 100vh; background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop') center/cover; overflow: hidden; color: white; }
        
        /* Desktop */
        #desktop { height: calc(100% - 65px); padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, 100px); grid-auto-rows: 100px; gap: 20px; z-index: 1; }
        .desktop-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; }
        .desktop-item:hover { background: rgba(255,255,255,0.15); }
        .desktop-item img { width: 48px; height: 48px; }
        .desktop-item span { font-size: 11px; margin-top: 8px; text-shadow: 0 1px 3px black; }

        /* Window System */
        .window { position: absolute; background: var(--win-bg); border-radius: 12px; display: none; flex-direction: column; z-index: 10; backdrop-filter: var(--bg-blur); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        .win-header { padding: 12px; background: rgba(0,0,0,0.1); display: flex; justify-content: space-between; cursor: move; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .win-content { flex: 1; display: flex; overflow: hidden; }

        /* Yxoncord Pro UI */
        #yxon-srvs { width: 72px; background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 10px; }
        #yxon-chans { width: 200px; background: #2b2d31; padding: 15px; border-right: 1px solid #1e1f22; display: flex; flex-direction: column; }
        #yxon-chat { flex: 1; background: #313338; display: flex; flex-direction: column; }
        .srv-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: #313338; color: white; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 14px; }
        .srv-btn:hover, .srv-btn.active { border-radius: 15px; background: #5865f2; }
        .chan-item { padding: 8px 10px; border-radius: 4px; cursor: pointer; color: #949ba4; margin-bottom: 2px; }
        .chan-item:hover, .chan-item.active { background: #3f4147; color: white; }
        .chan-item::before { content: "# "; opacity: 0.6; }
        #msg-flow { flex: 1; overflow-y: auto; padding: 20px; }
        .msg-input { background: #383a40; border: none; margin: 15px; padding: 12px; border-radius: 8px; color: white; outline: none; }

        /* App Specifics */
        #term-out { background: black; color: lime; font-family: monospace; padding: 10px; flex: 1; overflow-y: auto; }
        #market-ui { padding: 15px; width: 100%; overflow-y: auto; background: #000; }
        #note-area { width: 100%; height: 100%; padding: 15px; border: none; resize: none; outline: none; font-size: 15px; }

        /* Taskbar */
        #taskbar { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); height: 55px; padding: 0 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-radius: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.1); z-index: 999; }
        .task-icon { width: 38px; cursor: pointer; transition: 0.2s; }
        .task-icon:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<div id="desktop">
    <div class="desktop-item" onclick="toggleWin('win-yxon')"><img src="https://img.icons8.com/color/96/discord-new-logo.png"><span>Yxoncord</span></div>
    <div class="desktop-item" onclick="toggleWin('win-stocks')"><img src="https://img.icons8.com/color/96/stocks.png"><span>Market</span></div>
    <div class="desktop-item" onclick="toggleWin('win-term')"><img src="https://img.icons8.com/color/96/console.png"><span>Terminal</span></div>
    <div class="desktop-item" onclick="toggleWin('win-note')"><img src="https://img.icons8.com/color/96/notepad.png"><span>Notepad</span></div>
</div>

<div id="win-yxon" class="window" style="width: 850px; height: 550px; top: 50px; left: 100px;">
    <div class="win-header"><span>Yxoncord Pro</span> <span onclick="toggleWin('win-yxon')" style="cursor:pointer">●</span></div>
    <div class="win-content">
        <div id="yxon-srvs">
            <button class="srv-btn" onclick="addServer()" style="background:#23a559;">+</button>
            <button class="srv-btn" onclick="joinServer()" style="background:#4e5058;">🔑</button>
            <div id="srv-list-ui"></div>
        </div>
        <div id="yxon-chans">
            <div style="font-size:11px; font-weight:bold; margin-bottom:10px; display:flex; justify-content:space-between; color:white;">
                CHANNELS <span onclick="addChannel()" style="cursor:pointer; color:#23a559;">+</span>
            </div>
            <div id="chan-list-ui"></div>
            <div style="flex:1"></div>
            <div id="user-info" style="font-size:12px; background:rgba(0,0,0,0.2); padding:10px; border-radius:5px;">
                <b id="my-name-display">...</b><br><span id="my-id-display" style="opacity:0.5; font-size:10px;">#0000</span>
            </div>
        </div>
        <div id="yxon-chat">
            <div id="msg-flow">Select a server to start.</div>
            <input type="text" id="chat-in" class="msg-input" placeholder="Message..." disabled>
        </div>
    </div>
</div>

<div id="win-stocks" class="window" style="width: 350px; height: 450px; top: 80px; left: 450px;">
    <div class="win-header"><span>Market Live</span> <span onclick="toggleWin('win-stocks')">●</span></div>
    <div class="win-content"><div id="market-ui">
        BTC: <b id="p-btc">$...</b><canvas id="c-btc"></canvas>
        ETH: <b id="p-eth">$...</b><canvas id="c-eth"></canvas>
    </div></div>
</div>

<div id="win-term" class="window" style="width: 500px; height: 300px; top: 200px; left: 300px;">
    <div class="win-header"><span>Terminal</span> <span onclick="toggleWin('win-term')">●</span></div>
    <div class="win-content"><div id="term-out">Root@User:~# <input type="text" id="term-in" style="background:transparent; border:none; color:lime; outline:none; width:70%;"></div></div>
</div>

<div id="win-note" class="window" style="width: 400px; height: 400px; top: 150px; left: 200px;">
    <div class="win-header"><span>Notepad</span> <span onclick="toggleWin('win-note')">●</span></div>
    <div class="win-content"><textarea id="note-area" placeholder="Write something..."></textarea></div>
</div>

<div id="taskbar">
    <img src="https://img.icons8.com/color/48/discord-new-logo.png" class="task-icon" onclick="toggleWin('win-yxon')">
    <img src="https://img.icons8.com/color/48/stocks.png" class="task-icon" onclick="toggleWin('win-stocks')">
    <img src="https://img.icons8.com/color/48/console.png" class="task-icon" onclick="toggleWin('win-term')">
    <img src="https://img.icons8.com/color/48/notepad.png" class="task-icon" onclick="toggleWin('win-note')">
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = { apiKey: "AI...", databaseURL: "https://..." }; // FILL THIS
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- SECURE IDENTITY ---
    let myUID = localStorage.getItem('yxon_uid') || 'u' + Math.random().toString(36).substr(2, 6);
    let myName = localStorage.getItem('yxon_name');

    async function authUser() {
        if (!myName) {
            let name = prompt("Choose a unique Username:");
            if (!name) return authUser();
            
            const check = await db.ref('yxon/registry/' + name.toLowerCase()).once('value');
            if (check.exists() && check.val() !== myUID) {
                alert("Username taken by someone else!");
                return authUser();
            }
            await db.ref('yxon/registry/' + name.toLowerCase()).set(myUID);
            myName = name;
            localStorage.setItem('yxon_name', myName);
            localStorage.setItem('yxon_uid', myUID);
        }
        document.getElementById('my-name-display').innerText = myName;
        document.getElementById('my-id-display').innerText = "#" + myUID.toUpperCase();
    }
    authUser();

    // --- OS UTILS ---
    function toggleWin(id) {
        let w = document.getElementById(id);
        w.style.display = (w.style.display === 'flex') ? 'none' : 'flex';
    }

    let activeWin = null, oX, oY;
    document.querySelectorAll('.win-header').forEach(h => {
        h.onmousedown = (e) => {
            activeWin = h.parentElement;
            oX = e.clientX - activeWin.offsetLeft; oY = e.clientY - activeWin.offsetTop;
            document.querySelectorAll('.window').forEach(win => win.style.zIndex = 10);
            activeWin.style.zIndex = 100;
        };
    });
    window.onmousemove = (e) => { if(activeWin) { activeWin.style.left = (e.clientX-oX)+'px'; activeWin.style.top = (e.clientY-oY)+'px'; } };
    window.onmouseup = () => activeWin = null;

    // --- YXONCORD LOGIC ---
    let curSrv = null, curChan = null;

    function getInitials(str) { return str.split(' ').map(n => n[0]).join('').toUpperCase().substr(0, 3); }

    function addServer() {
        let n = prompt("Server Name:");
        if(n) {
            let id = 'srv_' + Math.random().toString(36).substr(2, 5);
            db.ref('yxon/servers/'+id).set({ name: n, owner: myName });
            db.ref('yxon/channels/'+id).push({ name: 'general' });
        }
    }

    function joinServer() {
        let id = prompt("Enter Server ID:");
        if(id) db.ref('yxon/servers/'+id).once('value', s => s.exists() ? loadServer(id) : alert("Not found"));
    }

    function addChannel() {
        if(!curSrv) return;
        let n = prompt("Channel Name:");
        if(n) db.ref('yxon/channels/'+curSrv).push({ name: n.toLowerCase().replace(/\s/g, '-') });
    }

    db.ref('yxon/servers').on('value', snap => {
        let list = document.getElementById('srv-list-ui'); list.innerHTML = '';
        snap.forEach(s => {
            let b = document.createElement('button');
            b.className = 'srv-btn' + (curSrv === s.key ? ' active' : '');
            b.innerText = getInitials(s.val().name);
            b.title = "ID: " + s.key;
            b.onclick = () => loadServer(s.key);
            list.appendChild(b);
        });
    });

    function loadServer(id) {
        curSrv = id;
        db.ref('yxon/channels/'+id).on('value', snap => {
            let list = document.getElementById('chan-list-ui'); list.innerHTML = '';
            snap.forEach(c => {
                let d = document.createElement('div');
                d.className = 'chan-item' + (curChan === c.key ? ' active' : '');
                d.innerText = c.val().name;
                d.onclick = () => loadChannel(c.key, c.val().name);
                list.appendChild(d);
            });
        });
    }

    function loadChannel(id, name) {
        curChan = id;
        let input = document.getElementById('chat-in');
        input.disabled = false; input.placeholder = "#" + name;
        db.ref('yxon/msgs/'+id).off();
        db.ref('yxon/msgs/'+id).on('value', snap => {
            let flow = document.getElementById('msg-flow'); flow.innerHTML = '';
            snap.forEach(m => {
                flow.innerHTML += `<div><b style="color:#5865f2">${m.val().u}</b>: ${m.val().t}</div>`;
            });
            flow.scrollTop = flow.scrollHeight;
        });
    }

    document.getElementById('chat-in').onkeypress = (e) => {
        if(e.key === 'Enter' && e.target.value) {
            db.ref('yxon/msgs/'+curChan).push({ u: myName, t: e.target.value });
            e.target.value = '';
        }
    };

    // --- MARKET ---
    const btcC = new Chart(document.getElementById('c-btc'), { type: 'line', data: { labels: [], datasets: [{ label: 'BTC', data: [], borderColor: 'gold' }] }, options: { scales: { x: { display: false } } } });
    const ethC = new Chart(document.getElementById('c-eth'), { type: 'line', data: { labels: [], datasets: [{ label: 'ETH', data: [], borderColor: 'blue' }] }, options: { scales: { x: { display: false } } } });

    async function fetchMarket() {
        try {
            const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
            const d = await r.json();
            document.getElementById('p-btc').innerText = `$${d.bitcoin.usd}`;
            document.getElementById('p-eth').innerText = `$${d.ethereum.usd}`;
            [btcC, ethC].forEach((c, i) => {
                let p = i===0 ? d.bitcoin.usd : d.ethereum.usd;
                if(c.data.labels.length > 10) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
                c.data.labels.push(""); c.data.datasets[0].data.push(p); c.update();
            });
        } catch(e){}
    }
    setInterval(fetchMarket, 10000); fetchMarket();
</script>
</body>
</html>
