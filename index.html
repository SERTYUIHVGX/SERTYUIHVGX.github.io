<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yxon6 OS - Windows XP Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Tahoma", sans-serif; background: #000; }

        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: calc(100vh - 35px);
            width: 100vw;
            position: relative;
        }

        /* ICONS */
        .icon-container { display: flex; flex-direction: column; gap: 15px; padding: 20px; width: 110px; }
        .icon {
            width: 85px; height: 95px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-shadow: 2px 2px 2px rgba(0,0,0,0.9);
            cursor: pointer; font-size: 11px; text-align: center;
            user-select: none;
        }
        .icon:hover { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }
        .icon img { width: 42px; height: 42px; margin-bottom: 5px; pointer-events: none; }

        /* WINDOWS */
        .window {
            position: absolute; width: 600px; height: 400px;
            background: #ece9d8; border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0; display: none;
            flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 100;
        }

        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white; padding: 0 10px; display: flex;
            justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 13px; height: 30px; cursor: default;
            user-select: none;
        }

        .close-btn {
            background: #c72c2c; color: white; border: 1px solid white;
            width: 21px; height: 21px; display: flex; align-items: center;
            justify-content: center; border-radius: 2px; cursor: pointer;
            font-size: 10px; font-weight: bold;
        }
        .close-btn:hover { background: #e04343; }

        /* BROWSER TABS */
        .tab-bar { display: flex; background: #dcdadc; padding: 2px 5px 0 5px; gap: 2px; border-bottom: 1px solid #aca899; }
        .tab {
            background: #bdbebd; border: 1px solid #7b7b7b; border-bottom: none;
            padding: 4px 10px; font-size: 11px; cursor: pointer; min-width: 100px;
            border-radius: 3px 3px 0 0; display: flex; justify-content: space-between;
            align-items: center;
        }
        .tab.active { background: #ece9d8; font-weight: bold; border-top: 2px solid #ff9600; }
        .close-tab { margin-left: 10px; color: #555; font-weight: bold; }

        .browser-nav { background: #ece9d8; padding: 6px; display: flex; gap: 6px; border-bottom: 1px solid #aca899; }
        .url-bar { flex-grow: 1; padding: 4px; border: 1px solid #7f9db9; outline: none; font-size: 12px; }
        
        .window-body { flex-grow: 1; background: white; position: relative; overflow: hidden; }
        .browser-frame { width: 100%; height: 100%; border: none; display: none; }
        .browser-frame.active { display: block; }

        /* NOTEPAD */
        .notepad-area { width: 100%; height: 100%; border: none; padding: 10px; font-family: 'Courier New', monospace; outline: none; resize: none; }

        /* TASKBAR */
        .taskbar {
            position: fixed; bottom: 0; width: 100%; height: 35px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex; justify-content: space-between; align-items: center; z-index: 9999;
        }
        .start-btn { height: 100%; cursor: pointer; transition: filter 0.1s; }
        .start-btn:active { filter: brightness(0.8); }
        .system-tray { color: white; background: #0997ff; height: 100%; display: flex; align-items: center; padding: 0 15px; font-size: 12px; border-left: 1px solid #0054e3; }
    </style>
</head>
<body>

<div class="desktop">
    <div class="icon-container">
        <div class="icon" onclick="openWindow('os-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/console_prompt-0.png">
            <span>Yxon6 OS</span>
        </div>
        <div class="icon" onclick="openWindow('netscape-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/world-0.png">
            <span>Browser</span>
        </div>
        <div class="icon" onclick="openWindow('notepad-window')">
            <img src="https://win98icons.alexmeub.com/icons/png/notepad-0.png">
            <span>Notepad</span>
        </div>
    </div>

    <div id="os-window" class="window" style="top:30px; left:150px;" onmousedown="focusWin(this)">
        <div class="window-header" id="os-window-header">
            <span>Yxon6 OS Terminal</span>
            <div class="close-btn" onclick="closeWindow('os-window')">X</div>
        </div>
        <div class="window-body" style="background:black;">
            <iframe id="os-frame" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <div id="netscape-window" class="window" style="top:60px; left:180px; width:750px; height:550px;" onmousedown="focusWin(this)">
        <div class="window-header" id="netscape-window-header">
            <span>NetScape Navigator</span>
            <div class="close-btn" onclick="closeWindow('netscape-window')">X</div>
        </div>
        <div class="tab-bar" id="tab-bar">
            <button onclick="createNewTab()" style="cursor:pointer; margin-left:5px;">+</button>
        </div>
        <div class="browser-nav">
            <input type="text" class="url-bar" id="url-input" placeholder="Search or Enter URL..." onkeydown="if(event.key==='Enter') netGo(this.value)">
            <button onclick="netGo(document.getElementById('url-input').value)" style="cursor:pointer; padding: 0 10px;">Go</button>
        </div>
        <div class="window-body" id="browser-container"></div>
    </div>

    <div id="notepad-window" class="window" style="top:100px; left:210px; width:450px; height:350px;" onmousedown="focusWin(this)">
        <div class="window-header" id="notepad-window-header">
            <span>Untitled - Notepad</span>
            <div class="close-btn" onclick="closeWindow('notepad-window')">X</div>
        </div>
        <div class="window-body">
            <textarea class="notepad-area" placeholder="Type here..."></textarea>
        </div>
    </div>
</div>

<div class="taskbar">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3e/Windows_XP_Start_button.png/150px-Windows_XP_Start_button.png" class="start-btn" onclick="alert('Start Menu clicked!')">
    <div class="system-tray" id="clock">00:00 AM</div>
</div>

<script>
    let tabIdCounter = 0;
    let activeTabId = null;
    let highestZ = 100;

    // --- TERMINAL INTERNAL CODE ---
    const termCode = `<html><head><style>
        body { background:black; color:#ff0000; font-family:'Courier New', monospace; padding:15px; margin:0; overflow:hidden; }
        #o { white-space: pre-wrap; font-size: 12px; line-height: 1.2; height: calc(100% - 30px); overflow-y: auto; }
        .input-line { display: flex; align-items: center; margin-top: 5px; }
        #i { background:transparent; border:none; color:#ff0000; outline:none; flex-grow:1; font-family:inherit; font-size:inherit; }
        .prompt { color:#ff0000; font-weight:bold; margin-right:8px; }
    </style></head>
    <body onclick="document.getElementById('i').focus()">
        <div id="o">[ YXON6 OPERATING SYSTEM ONLINE ]\nType 'help' for commands.</div>
        <div class="input-line"><span class="prompt">yxon6@root:~$</span><input id="i" autofocus autocomplete="off"></div>
        <script>
            const input = document.getElementById('i');
            const output = document.getElementById('o');
            input.onkeydown = (e) => {
                if(e.key === 'Enter'){
                    const cmd = input.value.trim().toLowerCase();
                    output.innerHTML += "\\nyxon6@root:~$ " + input.value + "\\n";
                    if(cmd === 'help') output.innerHTML += "Available: HELP, CLEAR, ABOUT, EXIT\\n";
                    else if(cmd === 'about') output.innerHTML += "YXON6 OS v1.0. Retro-Bypass Enabled.\\n";
                    else if(cmd === 'clear') output.innerHTML = "";
                    else if(cmd !== "") output.innerHTML += "Unknown command: " + cmd + "\\n";
                    input.value = "";
                    output.scrollTop = output.scrollHeight;
                }
            }
        <\/script></body></html>`;

    // --- CLOCK ---
    function updateClock() {
        const now = new Date();
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        document.getElementById('clock').textContent = `${h}:${m} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- WINDOW FOCUS ---
    function focusWin(elm) {
        highestZ++;
        elm.style.zIndex = highestZ;
    }

    // --- DRAG LOGIC ---
    function initDrag(elm) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const header = document.getElementById(elm.id + "-header");
        
        header.onmousedown = (e) => {
            e.preventDefault();
            focusWin(elm);
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = () => {
                document.onmouseup = null;
                document.onmousemove = null;
            };
            document.onmousemove = (e) => {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elm.style.top = (elm.offsetTop - pos2) + "px";
                elm.style.left = (elm.offsetLeft - pos1) + "px";
            };
        };
    }

    document.querySelectorAll('.window').forEach(initDrag);

    // --- WINDOW CONTROL ---
    function openWindow(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWin(win);
        if(id === 'os-window') {
            const frame = document.getElementById('os-frame');
            if(!frame.srcdoc) frame.srcdoc = termCode;
        }
        if(id === 'netscape-window' && !activeTabId) createNewTab();
    }

    function closeWindow(id) {
        document.getElementById(id).style.display = 'none';
    }

    // --- BROWSER TABS ---
    function createNewTab(url = 'https://www.bing.com') {
        tabIdCounter++;
        const id = `tab-${tabIdCounter}`;
        
        const tabBtn = document.createElement('div');
        tabBtn.className = 'tab';
        tabBtn.id = `btn-${id}`;
        tabBtn.innerHTML = `<span>New Tab</span> <span class="close-tab" onclick="closeTab(event, '${id}')">×</span>`;
        tabBtn.onclick = () => switchTab(id);
        
        const tabBar = document.getElementById('tab-bar');
        tabBar.insertBefore(tabBtn, tabBar.lastElementChild);

        const frame = document.createElement('iframe');
        frame.id = id;
        frame.className = 'browser-frame';
        frame.src = url;
        document.getElementById('browser-container').appendChild(frame);
        
        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.browser-frame').forEach(f => f.classList.remove('active'));
        
        const btn = document.getElementById(`btn-${id}`);
        if(btn) btn.classList.add('active');
        
        const frame = document.getElementById(id);
        if(frame) {
            frame.classList.add('active');
            document.getElementById('url-input').value = frame.src.includes('bing.com') ? '' : frame.src;
        }
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById(`btn-${id}`).remove();
        document.getElementById(id).remove();
        if (activeTabId === id) {
            const last = document.querySelector('.tab');
            if (last) switchTab(last.id.replace('btn-', ''));
            else activeTabId = null;
        }
    }

    function netGo(val) {
        if (!activeTabId) createNewTab();
        let url = val.trim();
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;
        
        const frame = document.getElementById(activeTabId);
        frame.src = url;
        document.getElementById(`btn-${activeTabId}`).querySelector('span').textContent = url.split('/')[2] || "Page";
    }
</script>

</body>
</html>
