<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS - Fully Functional</title>
    <style>
        /* CORE DESKTOP */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Tahoma", sans-serif; background: #000; }

        .desktop {
            background: #3a6ea5 url('https://upload.wikimedia.org/wikipedia/commons/7/70/Windows_XP_Bliss.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            position: relative;
            padding: 20px;
        }

        .icon {
            width: 80px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
        }
        .icon img { width: 40px; height: 40px; margin-bottom: 5px; }

        /* WINDOW LOGIC */
        .window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 80%;
            max-width: 900px;
            background: #ece9d8;
            border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0;
            display: none;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .window-header {
            background: linear-gradient(to bottom, #0058e3 0%, #307cee 100%);
            color: white;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .close-btn {
            background: #c72c2c;
            color: white;
            border: 1px solid white;
            width: 22px;
            height: 22px;
            border-radius: 3px;
            text-align: center;
            line-height: 18px;
            font-weight: bold;
        }

        .window-body { flex-grow: 1; background: black; margin: 2px; position: relative; }
        
        iframe { width: 100%; height: 100%; border: none; }

        /* TASKBAR */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to bottom, #245edb 0%, #1941a5 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            padding-right: 10px;
        }
    </style>
</head>
<body>

<div class="desktop">
    <div class="icon" onclick="openWindow('terminal-win')">
        <img src="https://win98icons.alexmeub.com/icons/png/console_prompt-0.png">
        <span>Yxon6 OS</span>
    </div>

    <div class="icon" onclick="openWindow('bing-win')">
        <img src="https://www.bing.com/favicon.ico">
        <span>Bing</span>
    </div>

    <div id="terminal-win" class="window">
        <div class="window-header">
            <span>Yxon6 OS Terminal</span>
            <div class="close-btn" onclick="closeWindow('terminal-win')">X</div>
        </div>
        <div class="window-body">
            <iframe id="term-frame"></iframe>
        </div>
    </div>

    <div id="bing-win" class="window">
        <div class="window-header">
            <span>Bing Search</span>
            <div class="close-btn" onclick="closeWindow('bing-win')">X</div>
        </div>
        <div class="window-body" style="background: white;">
            <iframe id="bing-frame"></iframe>
        </div>
    </div>
</div>

<div class="taskbar">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3e/Windows_XP_Start_button.png/150px-Windows_XP_Start_button.png" style="height:100%">
    <div id="clock" style="font-size: 12px; font-weight: bold;">00:00</div>
</div>

<script>
    // THE TERMINAL SYSTEM CODE
    const terminalSource = `
    <html>
    <head>
        <style>
            body { background: black; color: #ff0000; font-family: 'Courier New', monospace; margin: 0; padding: 15px; overflow-x: hidden; }
            #logo { white-space: pre; font-size: 8px; line-height: 1; margin-bottom: 15px; }
            .line { margin-bottom: 4px; word-break: break-all; }
            .prompt-line { display: flex; align-items: center; }
            input { background: transparent; border: none; color: #ff0000; font-family: inherit; font-size: 16px; outline: none; width: 100%; caret-color: white; }
            a { color: #00ff00; text-decoration: underline; cursor: pointer; }
        </style>
    </head>
    <body onclick="document.getElementById('in').focus()">
        <div id="logo">
 в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— 
 в•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қв•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ 
  в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ  в•ҡв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— 
   в•ҡв–Ҳв–Ҳв•”в•қ   в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—
    в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ
    в•ҡв•җв•қ   в•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ 
        </div>
        <div id="output">
            <div class="line">YXON6 OS [Version 4.0.26]</div>
            <div class="line">System initialized. Type 'help' for commands.</div>
        </div>
        <div class="prompt-line">
            <span style="white-space:nowrap; margin-right:5px;">guest@yxon6:~$</span>
            <input type="text" id="in" autofocus autocomplete="off" spellcheck="false">
        </div>

        <script>
            const out = document.getElementById('output');
            const input = document.getElementById('in');
            const db = {
                'proxylist': ['AWP', 'TRUFFLED', 'NEBULA', 'VAPOUR'],
                'awp': 'https://lessons.axsetubal.pt/',
                'truffled': 'https://truffled.lol/',
                'nebula': 'https://math.school.dovereducation.org/'
            };

            function print(text, isLink = false) {
                const div = document.createElement('div');
                div.className = 'line';
                if(isLink) {
                    div.innerHTML = '> ACCESS GRANTED: <a href="'+text+'" target="_blank">'+text+'</a>';
                } else {
                    div.textContent = text;
                }
                out.appendChild(div);
                window.scrollTo(0, document.body.scrollHeight);
            }

            input.addEventListener('keydown', (e) => {
                if(e.key === 'Enter') {
                    const cmd = input.value.toLowerCase().trim();
                    print('guest@yxon6:~$ ' + input.value);
                    input.value = '';

                    if(cmd === 'help') {
                        print('Commands: proxylist, speedtest, clear, [app_name]');
                    } else if(cmd === 'proxylist') {
                        print('DIRECTORIES: ' + Object.keys(db).filter(k => k !== 'proxylist').join(', ').toUpperCase());
                    } else if(db[cmd]) {
                        print(db[cmd], true);
                    } else if(cmd === 'speedtest') {
                        print('Calculating latency...');
                        setTimeout(() => print('Ping: 14ms | Down: 340 Mbps | Up: 88 Mbps'), 1000);
                    } else if(cmd === 'clear') {
                        out.innerHTML = '';
                    } else if(cmd !== '') {
                        print('ERR: Command not found.');
                    }
                }
            });
        <\/script>
    </body>
    </html>`;

    // WINDOW CONTROLS
    function openWindow(id) {
        document.getElementById(id).style.display = 'flex';
        if(id === 'terminal-win') {
            document.getElementById('term-frame').srcdoc = terminalSource;
        }
        if(id === 'bing-win') {
            document.getElementById('bing-frame').srcdoc = "<html><body style='margin:0; background:white; font-family:sans-serif; text-align:center; padding-top:100px;'><h1>Bing Search</h1><input type='text' placeholder='Search...' style='width:80%; padding:10px; border-radius:20px; border:1px solid #ccc;' onkeydown='if(event.key===\"Enter\") window.open(\"https://www.bing.com/search?q=\"+this.value, \"_blank\")'><p>Type and hit Enter to search</p></body></html>";
        }
    }

    function closeWindow(id) {
        document.getElementById(id).style.display = 'none';
    }

    function updateClock() {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
