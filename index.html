<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yxon6 OS - Lookout Terminal</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { 
            background-color: #008080; 
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: "MS Sans Serif", Arial, sans-serif;
            -webkit-font-smoothing: none;
        }
        .desktop {
            height: calc(100vh - 30px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .icon {
            width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: white;
            font-size: 11px;
            cursor: pointer;
            text-shadow: 1px 1px #000;
        }
        .icon img { width: 32px; height: 32px; margin-bottom: 4px; }

        /* Window Styling */
        .window {
            position: absolute;
            z-index: 10;
            user-select: none;
            display: flex;
            flex-direction: column;
        }
        .title-bar { cursor: move; }
        .window-body { flex-grow: 1; padding: 0; margin: 0; overflow: hidden; position: relative; }

        /* F2F Episode 4 Map Aesthetic */
        .map-viewer {
            background: #1a1a15;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .map-image {
            width: 110%; /* Slight zoom for that cramped look */
            filter: sepia(1) contrast(1.5) brightness(0.6) grayscale(0.2);
            mix-blend-mode: lighten;
        }
        /* Grain and Scanline Overlays */
        .vhs-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 2;
        }
        .map-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            text-shadow: 0 0 5px #00ff00;
            z-index: 3;
            pointer-events: none;
        }

        .taskbar {
            height: 30px;
            background: #c0c0c0;
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 2px;
            box-sizing: border-box;
            border-top: 2px solid #fff;
            z-index: 1000;
        }
        .start-button { display: flex; align-items: center; gap: 4px; font-weight: bold; height: 22px; padding: 2px 6px; }
    </style>
</head>
<body x-data="{ mapOpen: true, yxon6Open: false }">

    <div class="desktop">
        <div class="icon" @click="mapOpen = true">
            <img src="https://win98icons.alexmeub.com/icons/png/world-1.png">
            <span>Louisiana Map</span>
        </div>
        <div class="icon" @click="yxon6Open = true">
            <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-5.png">
            <span>Yxon6 OS</span>
        </div>
    </div>

    <div class="window" x-show="mapOpen" x-draggable style="width: 550px; height: 450px; top: 50px; left: 150px;">
        <div class="title-bar">
            <div class="title-bar-text">MapViewer - LA_Sector_North.tga</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close" @click="mapOpen = false"></button>
            </div>
        </div>
        <div class="window-body">
            <div class="map-viewer">
                <div class="vhs-overlay"></div>
                <div class="map-ui">
                    REC [●]<br>
                    LOC: LOUISIANA PARISH<br>
                    ELEV: 240ft<br>
                    CONDITION: OVERCAST
                </div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Map_of_Louisiana_NA.svg/1200px-Map_of_Louisiana_NA.svg.png" class="map-image">
            </div>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-button">
            <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16">
            Start
        </button>
        <div style="flex-grow: 1;"></div>
        <div class="status-bar" style="padding: 2px 10px; box-shadow: inset -1px -1px #fff, inset 1px 1px #808080;">
            <span id="time" style="font-size: 11px;">12:00 PM</span>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.directive('draggable', (el) => {
                let titleBar = el.querySelector('.title-bar');
                titleBar.onmousedown = (e) => {
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
                    el.style.zIndex = 100;
                    let mouseX = e.clientX, mouseY = e.clientY;
                    document.onmousemove = (e) => {
                        let offsetX = mouseX - e.clientX, offsetY = mouseY - e.clientY;
                        mouseX = e.clientX; mouseY = e.clientY;
                        el.style.top = (el.offsetTop - offsetY) + 'px';
                        el.style.left = (el.offsetLeft - offsetX) + 'px';
                    };
                    document.onmouseup = () => { document.onmousemove = null; };
                }
            });
        });
        function updateClock() {
            document.getElementById('time').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
