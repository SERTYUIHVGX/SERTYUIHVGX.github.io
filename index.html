<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal OS - Yxoncord Pro</title>
    <style>
        :root { 
            --bg-blur: blur(25px); 
            --win-bg: rgba(255, 255, 255, 0.9); 
            --taskbar-bg: rgba(243, 243, 243, 0.8); 
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop') center/cover; }

        /* Desktop & Windows */
        #desktop { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 70px); padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, 90px); grid-auto-flow: column; gap: 15px; z-index: 1; }
        .desktop-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 85px; padding: 10px; border-radius: 5px; }
        .desktop-item:hover { background: rgba(255,255,255,0.2); }
        .desktop-item img { width: 45px; height: 45px; }
        .desktop-item span { color: white; font-size: 11px; text-shadow: 0 1px 2px black; margin-top: 5px; text-align: center; }

        .window { position: absolute; width: 650px; height: 450px; background: var(--win-bg); border-radius: 12px; display: none; flex-direction: column; z-index: 10; backdrop-filter: var(--bg-blur); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .win-header { padding: 12px; background: rgba(0,0,0,0.05); display: flex; justify-content: space-between; cursor: move; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .win-content { flex: 1; display: flex; overflow: hidden; }

        /* Yxoncord Pro UI */
        #yxon-servers { width: 70px; background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 10px; }
        #yxon-channels { width: 160px; background: #2b2d31; color: #949ba4; padding: 15px 10px; display: flex; flex-direction: column; gap: 5px; }
        #yxon-chat-area { flex: 1; background: #313338; color: white; display: flex; flex-direction: column; }
        
        .srv-icon { width: 45px; height: 45px; background: #35363c; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .srv-icon:hover, .srv-icon.active { border-radius: 30%; background: #5865f2; }
        
        .chan-item { padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .chan-item:hover { background: #3f4147; color: white; }
        .chan-item.active { background: #3f4147; color: white; }
        .chan-item::before { content: "# "; opacity: 0.5; }

        #yxon-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .msg-box { background: #383a40; margin: 10px; padding: 10px; border-radius: 8px; border: none; color: white; outline: none; }
        .ping { background: rgba(240, 178, 50, 0.1); border-left: 2px solid #f0b232; }

        /* Taskbar */
        #taskbar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); height: 55px; padding: 0 15px; background: var(--taskbar-bg); border-radius: 12px; display: flex; align-items: center; gap: 10px; z-index: 9999; border: 1px solid rgba(255,255,255,0.2); }
        .task-icon { width: 40px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="desktop-item" onclick="toggleWin('win-yxon')"><img src="https://img.icons8.com/color/96/discord-new-logo.png"><span>Yxoncord</span></div>
    <div class="desktop-item" onclick="toggleWin('win-stocks')"><img src="https://img.icons8.com/color/96/stocks.png"><span>Market</span></div>
    <div class="desktop-item" onclick="toggleWin('win-term')"><img src="https://img.icons8.com/color/96/console.png"><span>Terminal</span></div>
</div>

<div id="win-yxon" class="window">
    <div class="win-header"><span>Yxoncord Pro</span> <span onclick="toggleWin('win-yxon')" style="cursor:pointer">●</span></div>
    <div class="win-content">
        <div id="yxon-servers">
            <button onclick="addServer()" style="width:45px; height:45px; border-radius:50%; border:none; background:#23a559; color:white; font-size:24px; cursor:pointer">+</button>
            <div id="srv-list-ui"></div>
        </div>
        <div id="yxon-channels">
            <div style="font-weight:bold; color:white; margin-bottom:10px; font-size:12px; display:flex; justify-content:space-between">
                CHANNELS <span onclick="addChannel()" style="cursor:pointer">+</span>
            </div>
            <div id="chan-list-ui"></div>
        </div>
        <div id="yxon-chat-area">
            <div id="yxon-messages"></div>
            <input type="text" id="yxon-input" class="msg-box" placeholder="Message..." disabled>
        </div>
    </div>
</div>

<div id="win-stocks" class="window" style="width:300px; height:400px;"><div class="win-header"><span>Market</span><span onclick="toggleWin('win-stocks')">●</span></div><div class="win-content" id="market-ui" style="padding:20px; flex-direction:column"></div></div>
<div id="win-term" class="window"><div class="win-header"><span>Terminal</span><span onclick="toggleWin('win-term')">●</span></div><div class="win-content" style="background:black; color:lime; padding:10px;">Root@User:~# <input type="text" style="background:transparent; border:none; color:lime; outline:none;"></div></div>

<div id="taskbar">
    <div class="task-icon" onclick="toggleWin('win-yxon')"><img src="https://img.icons8.com/color/48/discord-new-logo.png"></div>
    <div class="task-icon" onclick="toggleWin('win-stocks')"><img src="https://img.icons8.com/color/48/stocks.png"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
// --- CONFIG ---
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_ID.firebaseapp.com",
    databaseURL: "https://YOUR_ID-default-rtdb.firebaseio.com",
    projectId: "YOUR_ID",
    storageBucket: "YOUR_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// State & Persistence
let myName = localStorage.getItem('yxon_name');
if(!myName) {
    myName = prompt("Enter your Username:") || "User" + Math.floor(Math.random()*999);
    localStorage.setItem('yxon_name', myName);
}
if(Notification.permission !== 'granted') Notification.requestPermission();

let currentSrv = localStorage.getItem('yxon_cur_srv');
let currentChan = localStorage.getItem('yxon_cur_chan');

// --- OS UTILS ---
function toggleWin(id) {
    const w = document.getElementById(id);
    w.style.display = w.style.display === 'flex' ? 'none' : 'flex';
}

let activeWin = null, oX, oY;
document.querySelectorAll('.win-header').forEach(h => {
    h.onmousedown = (e) => {
        activeWin = e.target.closest('.window');
        oX = e.clientX - activeWin.offsetLeft;
        oY = e.clientY - activeWin.offsetTop;
        activeWin.style.zIndex = 1000;
    };
});
window.onmousemove = (e) => { if(activeWin) { activeWin.style.left = (e.clientX-oX)+'px'; activeWin.style.top = (e.clientY-oY)+'px'; } };
window.onmouseup = () => activeWin = null;

// --- YXONCORD CORE ---
function addServer() {
    const name = prompt("Server Name:");
    if(name) {
        const id = 'srv_' + Date.now();
        db.ref('yxon/servers/' + id).set({ name: name, owner: myName });
        // Create default channel
        db.ref('yxon/channels/' + id).push({ name: 'general' });
    }
}

function addChannel() {
    if(!currentSrv) return alert("Select a server first!");
    const name = prompt("Channel Name:");
    if(name) db.ref('yxon/channels/' + currentSrv).push({ name: name.toLowerCase() });
}

// Listen for Servers
db.ref('yxon/servers').on('value', snap => {
    const list = document.getElementById('srv-list-ui');
    const data = snap.val() || {};
    list.innerHTML = '';
    for(let id in data) {
        const div = document.createElement('div');
        div.className = 'srv-icon' + (currentSrv === id ? ' active' : '');
        div.innerText = data[id].name[0].toUpperCase();
        div.onclick = () => switchServer(id);
        list.appendChild(div);
    }
});

function switchServer(id) {
    currentSrv = id;
    localStorage.setItem('yxon_cur_srv', id);
    // Listen for Channels
    db.ref('yxon/channels/' + id).on('value', snap => {
        const list = document.getElementById('chan-list-ui');
        const data = snap.val() || {};
        list.innerHTML = '';
        for(let cId in data) {
            const div = document.createElement('div');
            div.className = 'chan-item' + (currentChan === cId ? ' active' : '');
            div.innerText = data[cId].name;
            div.onclick = () => switchChannel(cId, data[cId].name);
            list.appendChild(div);
        }
    });
}

function switchChannel(id, name) {
    currentChan = id;
    localStorage.setItem('yxon_cur_chan', id);
    const input = document.getElementById('yxon-input');
    input.disabled = false;
    input.placeholder = `Message #${name}`;
    
    // Listen for Messages
    const msgDiv = document.getElementById('yxon-messages');
    msgDiv.innerHTML = '';
    db.ref('yxon/msgs/' + id).off();
    db.ref('yxon/msgs/' + id).limitToLast(30).on('child_added', snap => {
        const m = snap.val();
        const isPing = m.text.includes('@' + myName);
        const div = document.createElement('div');
        div.className = isPing ? 'ping' : '';
        div.style.padding = '4px 0';
        div.innerHTML = `<b style="color:#5865f2">${m.user}:</b> ${m.text}`;
        msgDiv.appendChild(div);
        msgDiv.scrollTop = msgDiv.scrollHeight;

        if(isPing && m.user !== myName) {
            new Notification("Yxoncord Ping!", { body: `${m.user} mentioned you in #${name}` });
        }
    });
}

document.getElementById('yxon-input').onkeypress = (e) => {
    if(e.key === 'Enter' && e.target.value) {
        db.ref('yxon/msgs/' + currentChan).push({ user: myName, text: e.target.value });
        e.target.value = '';
    }
};

// Auto-resume last session
if(currentSrv) switchServer(currentSrv);
</script>
</body>
</html>
